name: STRINGS.WORLDS.VERDANT_RIFT.NAME
description: STRINGS.WORLDS.VERDANT_RIFT.DESCRIPTION
asteroidIcon: Asteroid_forest

worldTraitScale: 1
worldsize:
  X: 256
  Y: 384
layoutMethod: PowerTree

defaultsOverrides:
  data:
    OverworldAvoidRadius: 5
    OverworldSampleBehaviour: PoissonDisk
    OverworldDensityMin: 18
    OverworldDensityMax: 18
  startingWorldElements: []

worldTraitRules:
  - min: 3
    max: 5
    forbiddenTraits:
      - traits/MetalPoor
      - traits/GeoDormant
    forbiddenTags:
      - StartChange
      - StartWorldOnly

subworldFiles:
  - name: subworlds/sandstone/SandstoneStart
  - name: subworlds/sandstone/SandstoneMiniMetal
    minCount: 1
  - name: subworlds/sandstone/SandstoneMiniWater
    minCount: 2
  - name: subworlds/sandstone/SandstoneMiniAlgae
    minCount: 2
  - name: subworlds/rift/VacuumRift
    minCount: 4
  - name: subworlds/sandstone/Sandstone
  - name: subworlds/marsh/HotMarsh
    minCount: 3
  - name: subworlds/jungle/Jungle
    minCount: 3
  - name: subworlds/frozen/Frozen
    minCount: 4
  - name: subworlds/ocean/Ocean
    minCount: 3
  - name: subworlds/magma/VolcanoBiome
    minCount: 2
  - name: subworlds/rift/MagmaRift
    minCount: 2
  - name: subworlds/magma/Bottom
  - name: subworlds/oil/OilPockets
    minCount: 2
  - name: subworlds/space/Space
  - name: subworlds/space/Surface

startSubworldName: subworlds/sandstone/SandstoneStart
startingBaseTemplate: bases/sandstoneBase

seasons:
  - VerdantRiftSpring
  - VerdantRiftSummer
  - VerdantRiftAutumn
  - VerdantRiftWinter

subworldMixingRules:
  - name: (Mixing1)
    minCount: 1
    maxCount: 2
  - name: (Mixing2)
    minCount: 1
    maxCount: 2
  - name: (Mixing3)
    minCount: 1
    maxCount: 2
  - name: (Mixing4)
    minCount: 1
    maxCount: 2
  - name: (Mixing5)
    minCount: 1
    maxCount: 2
  - name: (Mixing6)
    minCount: 1
    maxCount: 2

unknownCellsAllowedSubworlds:
  - tagcommand: Default
    command: Replace
    subworldNames:
      - subworlds/sandstone/Sandstone
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneMiniMetal
      - subworlds/sandstone/SandstoneMiniWater
      - subworlds/sandstone/SandstoneMiniAlgae
      - subworlds/rift/VacuumRift
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 2
    maxDistance: 2
    command: Replace
    subworldNames:
      - subworlds/sandstone/SandstoneMiniMetal
      - subworlds/sandstone/SandstoneMiniWater
      - subworlds/sandstone/SandstoneMiniAlgae
      - subworlds/marsh/HotMarsh
      - subworlds/jungle/Jungle
      - subworlds/rift/VacuumRift
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 3
    maxDistance: 4
    command: Replace
    subworldNames:
      - subworlds/marsh/HotMarsh
      - subworlds/jungle/Jungle
      - subworlds/ocean/Ocean
      - subworlds/frozen/Frozen
      - subworlds/magma/VolcanoBiome
      - subworlds/rift/MagmaRift
      - subworlds/rift/VacuumRift
      - (Mixing1)
      - (Mixing2)
      - (Mixing3)
      - (Mixing4)
      - (Mixing5)
      - (Mixing6)
  - tagcommand: DistanceFromTag
    tag: AtStart
    minDistance: 5
    maxDistance: 999
    command: Replace
    subworldNames:
      - subworlds/marsh/HotMarsh
      - subworlds/jungle/Jungle
      - subworlds/ocean/Ocean
      - subworlds/frozen/Frozen
      - subworlds/magma/VolcanoBiome
      - subworlds/rift/MagmaRift
      - (Mixing1)
      - (Mixing2)
      - (Mixing3)
      - (Mixing4)
      - (Mixing5)
      - (Mixing6)
  - tagcommand: AtTag
    tag: AtDepths
    command: Replace
    subworldNames:
      - subworlds/magma/Bottom
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/oil/OilPockets
  - tagcommand: DistanceFromTag
    tag: AtDepths
    minDistance: 2
    maxDistance: 3
    command: UnionWith
    subworldNames:
      - subworlds/magma/VolcanoBiome
      - subworlds/rift/MagmaRift
      - subworlds/rift/VacuumRift
  - tagcommand: AtTag
    tag: AtSurface
    command: Replace
    subworldNames:
      - subworlds/space/Space
  - tagcommand: DistanceFromTag
    tag: AtSurface
    minDistance: 1
    maxDistance: 1
    command: Replace
    subworldNames:
      - subworlds/space/Surface

worldTemplateRules:
  - names:
      - geysers/volcanohole
    listRule: TryOne
    times: 2
    allowDuplicates: true
    allowExtremeTemperatureOverlap: true
    priority: 180
    allowedCellsFilter:
      - command: Replace
        subworldNames:
          - subworlds/magma/VolcanoBiome
  - names:
      - poi/frozen/heatsink_a
      - poi/frozen/heatsink_b
      - poi/frozen/heatsink_c
      - poi/frozen/heatsink_d
    listRule: GuaranteeSomeTryMore
    someCount: 1
    moreCount: 2
    priority: 170
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [FrozenWastes]
  - names:
      - poi/jungle/geyser_steam
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [ToxicJungle]
  - names:
      - poi/hotmarsh/geyser_steam
    listRule: GuaranteeOne
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [BoggyMarsh]
  - names:
      - poi/poi_ocean_geyser_saltwater
    listRule: GuaranteeOne
    times: 1
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Ocean]
  - names:
      - poi/oil/small_oilpockets_geyser_a
      - poi/oil/small_oilpockets_geyser_b
      - poi/oil/small_oilpockets_geyser_c
      - poi/oil/small_oilpockets_geyser_d
      - poi/oil/small_oilpockets_geyser_e
      - poi/oil/small_oilpockets_geyser_f
      - poi/oil/small_oilpockets_geyser_g
      - poi/oil/small_oilpockets_geyser_h
    listRule: GuaranteeOne
    times: 1
    allowDuplicates: true
    priority: 100
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [OilField]
  - names:
      - geysers/generic
    listRule: TryOne
    times: 8
    ruleId: GenericGeysers
    allowDuplicates: true
    allowedCellsFilter:
      - command: Replace
        tagcommand: NotAtTag
        tag: NoGlobalFeatureSpawning
