        return;
    }
    if (e.button !== 0 || e.target.tagName === 'path' || e.target.closest('.node') || e.target.closest('.port') || e.target.closest('.material-picker') || e.target.closest('.node-menu')) return;
    if (!e.shiftKey) clearSelection();
    isBoxSelecting = true;
    selectionStart = getCanvasScreenPoint(e);
    selectionBox.style.display = 'block';
    updateSelectionBox(selectionStart);
    materialPicker.classList.remove('visible');
    e.preventDefault();
});

document.addEventListener('mousemove', e => {
    lastMouseCanvasPoint = getCanvasPoint(e);
    if (isPanningCanvas && panStartPoint && panStartOffset) {
        if (rightMouseDownPoint && Math.hypot(e.clientX - rightMouseDownPoint.x, e.clientY - rightMouseDownPoint.y) > 5) {
            rightPanMoved = true;
        }
        setCanvasPan(
            panStartOffset.x + e.clientX - panStartPoint.x,
            panStartOffset.y + e.clientY - panStartPoint.y
        );
        return;
    }
    if (resizeGroupId) {
        applyGroupResize(e);
        return;
    }
    if (dragNodeId && dragStartMouse) {
        let dx = (e.clientX - dragStartMouse.x) / canvasZoom;
        let dy = (e.clientY - dragStartMouse.y) / canvasZoom;
        dragSelectedNodes.forEach(nodeId => {
            const startPos = dragStartPositions[nodeId];
            const nodeEl = document.getElementById(nodeId);
            if (!startPos || !nodeEl || !nodesData[nodeId]) return;
            const width = nodesData[nodeId].type === 'group' ? getGroupSize(nodeId).width : (nodeEl.offsetWidth || 160);
            const height = nodesData[nodeId].type === 'group' ? getGroupSize(nodeId).height : (nodeEl.offsetHeight || 100);
            dx = Math.min(dx, WORKSPACE_WIDTH - width - startPos.x);
            dy = Math.min(dy, WORKSPACE_HEIGHT - height - startPos.y);
            dx = Math.max(dx, -startPos.x);
            dy = Math.max(dy, -startPos.y);
        });
        // Pixel-screen snap: only engage when the screen is genuinely close to a
        // canvas grid line or another pixel screen; free dragging stays free.
        if (dragSelectedNodes.length === 1 && nodesData[dragNodeId]?.type === 'pixel-screen') {
            const myEl = document.getElementById(dragNodeId);
            const myW = myEl ? myEl.offsetWidth : 150;
            const myH = myEl ? myEl.offsetHeight : 42;
            const myStart = dragStartPositions[dragNodeId];
            let snapX = myStart.x + dx;
            let snapY = myStart.y + dy;
            const canvasGridSize = 20;
            const gridSnapDistance = 7;
            const snapDistX = 12;
            const snapDistY = 10;
            const gap = -2;
            const nearestGridX = Math.round(snapX / canvasGridSize) * canvasGridSize;
            const nearestGridY = Math.round(snapY / canvasGridSize) * canvasGridSize;
            if (Math.abs(snapX - nearestGridX) <= gridSnapDistance) snapX = nearestGridX;
            if (Math.abs(snapY - nearestGridY) <= gridSnapDistance) snapY = nearestGridY;
            Object.entries(nodesData).forEach(([oid, onode]) => {
                if (oid === dragNodeId || onode.type !== 'pixel-screen') return;
                const otherEl = document.getElementById(oid);
                const otherW = otherEl ? otherEl.offsetWidth : 150;
                const otherH = otherEl ? otherEl.offsetHeight : 42;
                // Snap Y — same row
                if (Math.abs(snapY - onode.y) <= snapDistY) snapY = onode.y;
                // Snap Y — stacked below target
                else if (Math.abs(snapY - (onode.y + otherH + gap)) <= snapDistY) snapY = onode.y + otherH + gap;
                // Snap Y — stacked above target
                else if (Math.abs((snapY + myH + gap) - onode.y) <= snapDistY) snapY = onode.y - myH - gap;
                // Snap X — right side of target
                if (Math.abs(snapX - (onode.x + otherW + gap)) <= snapDistX) snapX = onode.x + otherW + gap;
                // Snap X — left side of target
                else if (Math.abs((snapX + myW + gap) - onode.x) <= snapDistX) snapX = onode.x - myW - gap;
            });
            dx = snapX - myStart.x;
            dy = snapY - myStart.y;
        }
        dragSelectedNodes.forEach(nodeId => {
            const startPos = dragStartPositions[nodeId];
            const nodeEl = document.getElementById(nodeId);
            if (!startPos || !nodeEl || !nodesData[nodeId]) return;
            const x = startPos.x + dx;
            const y = startPos.y + dy;
            nodeEl.style.left = `${x}px`;
            nodeEl.style.top = `${y}px`;
            nodesData[nodeId].x = x;
            nodesData[nodeId].y = y;
        });
        renderConnections();
        persistLayout();
    }
    if (relinkPointer && pendingPortRelink) {
        const distance = Math.hypot(e.clientX - relinkPointer.clientX, e.clientY - relinkPointer.clientY);
        if (distance >= 3) relinkPointer.moved = true;
        if (relinkPointer.moved) {
            const point = getCanvasPoint(e);
            const target = findRelinkPort(point.x, point.y);
            setSnappedPort(target);
            updateRelinkPreview(point, target);
        }
    }
    if (activeDrawingLine && sourcePortEl) {
        const p1 = activeDrawingAnchor || calculatePortAbsolutePos(sourcePortEl);
        const point = getCanvasPoint(e);
        const mouseX = point.x;
        const mouseY = point.y;
        const snapTarget = findSnapPort(mouseX, mouseY);
        setSnappedPort(snapTarget);
        const p2 = snapTarget ? calculatePortAbsolutePos(snapTarget) : { x: mouseX, y: mouseY };
        activeDrawingLine.setAttribute('d', buildWirePath(p1, p2, activeDrawingWaypoints));
    }
    if (isBoxSelecting && selectionStart) {
        updateSelectionBox(getCanvasScreenPoint(e));
    }
    // Keep this state outside the SVG element: rendering a moved waypoint replaces
    // its circle, so storing it on the circle makes the next mousemove lose the drag.
    if (waypointDrag) {
        if (!waypointDrag.moved) {
            const d = Math.hypot(e.clientX - waypointDrag.clientX, e.clientY - waypointDrag.clientY);
            if (d < 3) return;
            waypointDrag.moved = true;
        }
        const pt = getCanvasPoint(e);
        const dx = pt.x - waypointDrag.start.x;
        const dy = pt.y - waypointDrag.start.y;
        if (waypointDrag.graphNodeId) {
            waypointDrag.graphItems.forEach(item => {
                const node = nodesData[item.id];
                if (!node) return;
                node.x = Math.max(0, Math.min(WORKSPACE_WIDTH, item.x + dx));
                node.y = Math.max(0, Math.min(WORKSPACE_HEIGHT, item.y + dy));
                document.getElementById(item.id)?.setAttribute('transform', `translate(${node.x} ${node.y})`);
            });
            refreshGraphLinkGeometry();
            return;
        }
        waypointDrag.items.forEach(item => {
            item.wp.x = Math.max(0, Math.min(WORKSPACE_WIDTH, item.x + dx));
            item.wp.y = Math.max(0, Math.min(WORKSPACE_HEIGHT, item.y + dy));
        });
        renderConnections();
    }
});

document.addEventListener('mouseup', e => {
    if (!waypointDrag) return;
    const drag = waypointDrag;
    waypointDrag = null;
    if (drag.moved) {
        markDirty();
    }
});

document.addEventListener('mousedown', e => {
    if (!materialPicker.contains(e.target) && !e.target.closest('.material-content') && !e.target.closest('.building-content')) {
        materialPicker.classList.remove('visible');
    }
    if (!nodeMenu.contains(e.target)) {
        hideNodeMenu();
    }
});

document.addEventListener('mouseup', e => {
    if (skipActiveDrawingMouseup) {
        skipActiveDrawingMouseup = false;
        return;
    }
    if (relinkPointer) {
        const relink = relinkPointer;
        relinkPointer = null;
        if (!relink.moved) { cancelPendingPortRelink(); return; }
        const point = getCanvasPoint(e);
        const target = snappedPortEl || e.target.closest('.port') || findRelinkPort(point.x, point.y);
        if (!completePendingPortRelink(target)) cancelPendingPortRelink();
        return;
    }
    if (isPanningCanvas) {
        const shouldOpenNodeMenu = e.button === 2 && !rightPanMoved && rightMouseDownPoint && !e.target.closest('.node') && !e.target.closest('.port') && !e.target.closest('.material-picker') && !e.target.closest('.node-menu');
        const screenPoint = rightMouseDownPoint
            ? getCanvasScreenPoint({ clientX: rightMouseDownPoint.x, clientY: rightMouseDownPoint.y })
            : getCanvasScreenPoint(e);
        const canvasPoint = rightMouseCanvasPoint || getCanvasPoint(e);
        const restorePan = panStartOffset ? { ...panStartOffset } : { x: canvasPanX, y: canvasPanY };
        isPanningCanvas = false;
        panStartPoint = null;
        panStartOffset = null;
        canvas.classList.remove('panning');
        if (rightPanMoved) {
            persistLayout();
        } else {
            setCanvasPan(restorePan.x, restorePan.y);
        }
        rightMouseDownPoint = null;
        rightMouseCanvasPoint = null;
        rightPanMoved = false;
        if (shouldOpenNodeMenu) {
            showNodeMenu(screenPoint, canvasPoint);
        }
        return;
    }
    if (resizeGroupId) {
        endGroupResize();
        return;
    }
    if (isBoxSelecting) {
        finishBoxSelection(e);
        return;
    }
    dragNodeId = null;
    dragSelectedNodes = [];
    dragStartPositions = {};
    dragStartMouse = null;
    if (!activeDrawingLine) return;
    const point = getCanvasPoint(e);
    const mouseX = point.x;
    const mouseY = point.y;
    const targetPortEl = snappedPortEl || e.target.closest('.port, .reroute-input-port, .reroute-branch-port') || findSnapPort(mouseX, mouseY);
    if (targetPortEl && targetPortEl !== sourcePortEl) {
        if ((targetPortEl.classList.contains('reroute-input-port') || targetPortEl.classList.contains('reroute-branch-port')) && rerouteConnectionStart) {
            reconnectRerouteSegment(rerouteConnectionStart, targetPortEl);
        } else if (targetPortEl.classList.contains('port')) {
            const restoredOriginalSegment = rerouteConnectionStart?.side === 'input'
                ? reconnectRerouteToOriginalSource(rerouteConnectionStart, targetPortEl, activeDrawingWaypoints)
                : reconnectRerouteToOriginalTarget(rerouteConnectionStart, targetPortEl, activeDrawingWaypoints);
            if (!restoredOriginalSegment) {
                // Only the output side of a reroute node may create a new downstream branch.
                // Its input side is reserved for repairing the preceding segment.
                if (!rerouteConnectionStart || rerouteConnectionStart.side === 'output') {
                    connectPorts(sourcePortEl, targetPortEl, activeDrawingWaypoints, branchOriginWaypoint);
                }
            }
        }
    }
    activeDrawingLine.remove();
    activeDrawingLine = null;
    activeDrawingAnchor = null;
    activeDrawingWaypoints = [];
    branchOriginWaypoint = null;
    rerouteConnectionStart = null;
    activeRerouteHandles.forEach(handle => handle.remove());
    activeRerouteHandles = [];
    setSnappedPort(null);
    sourcePortEl = null;
    renderConnections();
});

// ===== Connection Drawing (SVG lines between ports) =====
function reconnectRerouteSegment(start, targetPort) {
    const targetConnectionId = targetPort.dataset.connectionId;
    const targetWaypointIndex = Number(targetPort.dataset.waypointIndex);
    const targetSide = targetPort.classList.contains('reroute-input-port') ? 'input' : 'output';
    if (!start || start.connectionId !== targetConnectionId || start.side === targetSide) return false;
    const conn = connections.find(item => item.id === start.connectionId);
    if (!conn) return false;
    const startSegmentIndex = start.side === 'input' ? start.waypointIndex : start.waypointIndex + 1;
    const targetSegmentIndex = targetSide === 'input' ? targetWaypointIndex : targetWaypointIndex + 1;
    if (startSegmentIndex !== targetSegmentIndex || !conn.brokenSegments?.includes(startSegmentIndex)) return false;
    conn.brokenSegments = conn.brokenSegments.filter(segmentIndex => segmentIndex !== startSegmentIndex);
    if (!conn.brokenSegments.length) delete conn.brokenSegments;
    selectedConnectionSegment = null;
    renderConnections();
    markCircuitDirty(nodeReachesOutput(conn.toNode));
    return true;
}

function reconnectRerouteToOriginalTarget(start, targetPort, insertedWaypoints = []) {
    if (!start || start.side !== 'output' || !targetPort?.classList.contains('input')) return false;
    const conn = connections.find(item => item.id === start.connectionId);
    if (!conn || !Array.isArray(conn.waypoints)) return false;

    const brokenSegmentIndex = start.waypointIndex + 1;
    const isLastWaypoint = start.waypointIndex === conn.waypoints.length - 1;
    const isOriginalTarget = targetPort.parentElement?.id === conn.toNode &&
        targetPort.dataset.port === conn.toPort;
    if (!isLastWaypoint || !isOriginalTarget || !conn.brokenSegments?.includes(brokenSegmentIndex)) {
        return false;
    }

    const additions = insertedWaypoints.map(wp => ({ x: wp.x, y: wp.y }));
    if (additions.length) {
        conn.waypoints.splice(start.waypointIndex + 1, 0, ...additions);
    }
    const shiftedBy = additions.length;
    const remainingBrokenSegments = conn.brokenSegments
        .filter(segmentIndex => segmentIndex !== brokenSegmentIndex)
        .map(segmentIndex => segmentIndex > brokenSegmentIndex ? segmentIndex + shiftedBy : segmentIndex);
    if (remainingBrokenSegments.length) conn.brokenSegments = remainingBrokenSegments;
    else delete conn.brokenSegments;

    selectedConnectionSegment = null;
    updateSignalMonitors();
    markCircuitDirty(nodeReachesOutput(conn.toNode));
    return true;
}

function reconnectRerouteToOriginalSource(start, targetPort, insertedWaypoints = []) {
    if (!start || start.side !== 'input' || !targetPort?.classList.contains('output')) return false;
    const conn = connections.find(item => item.id === start.connectionId);
    if (!conn || !Array.isArray(conn.waypoints) || start.waypointIndex !== 0) return false;
    const isOriginalSource = targetPort.parentElement?.id === conn.fromNode && targetPort.dataset.port === conn.fromPort;
    if (!isOriginalSource || !conn.brokenSegments?.includes(0)) return false;
    const additions = insertedWaypoints.map(wp => ({ x: wp.x, y: wp.y })).reverse();
    if (additions.length) conn.waypoints.splice(0, 0, ...additions);
    const shiftedBy = additions.length;
    const remaining = conn.brokenSegments
        .filter(segmentIndex => segmentIndex !== 0)
        .map(segmentIndex => segmentIndex + shiftedBy);
    if (remaining.length) conn.brokenSegments = remaining;
    else delete conn.brokenSegments;
    selectedConnectionSegment = null;
    updateSignalMonitors();
    markCircuitDirty(nodeReachesOutput(conn.toNode));
    return true;
}

function connectPorts(a, b, waypoints = [], branchFrom = null) {
    const pinOf = element => GraphSchema.pin(
        element.dataset.nodeId || element.parentElement?.id,
        element.classList.contains('output') ? 'output' : 'input',
        element.dataset.port || '0'
    );
    const pair = GraphSchema.canConnect(pinOf(a), pinOf(b));
    if (!pair) return;
    const affectedOutput = nodeReachesOutput(pair.input.nodeId);
    GraphSchema.connect(pair.output, pair.input);
    if (isWideMathType(nodesData[pair.input.nodeId]?.type)) refreshNodeDOM(pair.input.nodeId);
    updateSignalMonitors();
    markCircuitDirty(affectedOutput);
}

function calculatePortAbsolutePos(portEl) {
    const portRect = portEl.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    return {
        x: (portRect.left + portRect.width * 0.5 - canvasRect.left - canvasPanX) / canvasZoom,
        y: (portRect.top + portRect.height * 0.5 - canvasRect.top - canvasPanY) / canvasZoom
    };
}

function setSnappedPort(portEl) {
    if (snappedPortEl === portEl) return;
    snappedPortEl?.classList.remove('snap-target');
    snappedPortEl = portEl;
    snappedPortEl?.classList.add('snap-target');
}

function findSnapPort(mouseX, mouseY) {
    if (!sourcePortEl) return null;
    const wantsInput = sourcePortEl.classList.contains('output');
    const selector = wantsInput ? '.port.input' : '.port.output';
    let bestPort = null;
    let bestDistance = SNAP_DISTANCE;
    const candidates = Array.from(document.querySelectorAll(selector));
    if (rerouteConnectionStart) {
        const oppositeRerouteSide = rerouteConnectionStart.side === 'output' ? '.reroute-input-port' : '.reroute-branch-port';
        candidates.push(...document.querySelectorAll(oppositeRerouteSide));
    }
    candidates.forEach(port => {
        if (port === sourcePortEl || port.parentElement === sourcePortEl.parentElement) return;
        if (port.classList.contains('reroute-input-port') || port.classList.contains('reroute-branch-port')) {
            if (!canReconnectRerouteSegment(rerouteConnectionStart, port)) return;
        } else if (rerouteConnectionStart?.side === 'input') {
            const conn = connections.find(item => item.id === rerouteConnectionStart.connectionId);
            const isOriginalSource = rerouteConnectionStart.waypointIndex === 0 &&
                conn?.brokenSegments?.includes(0) && port.classList.contains('output') &&
                port.parentElement?.id === conn.fromNode && port.dataset.port === conn.fromPort;
            if (!isOriginalSource) return;
        }
        const pos = calculatePortAbsolutePos(port);
        const distance = Math.hypot(pos.x - mouseX, pos.y - mouseY);
        if (distance < bestDistance) {
            bestDistance = distance;
            bestPort = port;
        }
    });
    return bestPort;
}

function canReconnectRerouteSegment(start, targetPort) {
    if (!start || !targetPort) return false;
    const targetSide = targetPort.classList.contains('reroute-input-port') ? 'input' :
        targetPort.classList.contains('reroute-branch-port') ? 'output' : null;
    if (!targetSide || start.side === targetSide || targetPort.dataset.connectionId !== start.connectionId) return false;
    const conn = connections.find(item => item.id === start.connectionId);
    const targetWaypointIndex = Number(targetPort.dataset.waypointIndex);
    const startSegmentIndex = start.side === 'input' ? start.waypointIndex : start.waypointIndex + 1;
    const targetSegmentIndex = targetSide === 'input' ? targetWaypointIndex : targetWaypointIndex + 1;
    return startSegmentIndex === targetSegmentIndex && !!conn?.brokenSegments?.includes(startSegmentIndex);
}

function findRelinkPort(mouseX, mouseY) {
    if (!pendingPortRelink) return null;
    let bestPort = null;
    let bestDistance = SNAP_DISTANCE;
    document.querySelectorAll(`.port.${pendingPortRelink.direction}`).forEach(port => {
        const pos = calculatePortAbsolutePos(port);
        const distance = Math.hypot(pos.x - mouseX, pos.y - mouseY);
        if (distance < bestDistance) {
            bestDistance = distance;
            bestPort = port;
        }
    });
    return bestPort;
}

function updateRelinkPreview(mousePoint, targetPort) {
    relinkDrawingLines.forEach(line => line.remove());
    relinkDrawingLines = [];
    if (!pendingPortRelink) return;
    const end = targetPort ? calculatePortAbsolutePos(targetPort) : mousePoint;
    const ids = new Set(pendingPortRelink.connectionIds);
    connections.filter(conn => ids.has(conn.id)).forEach(conn => {
        const fixedNodeId = pendingPortRelink.direction === 'output' ? conn.toNode : conn.fromNode;
        const fixedPort = pendingPortRelink.direction === 'output' ? conn.toPort : conn.fromPort;
        const fixedDirection = pendingPortRelink.direction === 'output' ? 'input' : 'output';
        const fixedNode = document.getElementById(fixedNodeId);
        const fixedEl = fixedNode?.querySelector(`.port.${fixedDirection}[data-port="${fixedPort}"]`);
        if (!fixedEl) return;
        const fixed = calculatePortAbsolutePos(fixedEl);
        const p1 = pendingPortRelink.direction === 'output' ? end : fixed;
        const p2 = pendingPortRelink.direction === 'output' ? fixed : end;
        const deltaX = Math.abs(p2.x - p1.x) * 0.5;
        const line = newDrawingLine();
        line.setAttribute('stroke', '#7a8274');
        line.setAttribute('stroke-width', '3');
        line.removeAttribute('stroke-dasharray');
        line.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x + deltaX} ${p1.y}, ${p2.x - deltaX} ${p2.y}, ${p2.x} ${p2.y}`);
        appendWirePath(line);
        relinkDrawingLines.push(line);
    });
}

function getGraphPinPosition(nodeId, direction, portName) {
    const node = nodesData[nodeId];
    if (node?.type === 'reroute') {
        return { x: Number(node.x) + (direction === 'output' ? 8 : -8), y: Number(node.y) };
    }
    const nodeEl = document.getElementById(nodeId);
    const portEl = nodeEl?.querySelector(`.port.${direction}[data-port="${portName}"]`);
    return portEl ? calculatePortAbsolutePos(portEl) : null;
}

function refreshGraphLinkGeometry() {
    connections.forEach(link => {
        const path = document.getElementById(`conn-path-${link.id}-0`);
        if (!path) return;
        const from = getGraphPinPosition(link.fromNode, 'output', link.fromPort);
        const to = getGraphPinPosition(link.toNode, 'input', link.toPort);
        if (from && to) path.setAttribute('d', buildWirePath(from, to));
    });
}

function renderConnections() {
    svgLayer.innerHTML = '';
    wirePathsLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    wireHandlesLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    wirePathsLayer.setAttribute('data-layer', 'wire-paths');
    wireHandlesLayer.setAttribute('data-layer', 'wire-handles');
    svgLayer.appendChild(wirePathsLayer);
    svgLayer.appendChild(wireHandlesLayer);
    Object.entries(nodesData).forEach(([nodeId, node]) => {
        if (node.type !== 'reroute') return;
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.id = nodeId;
        group.classList.add('reroute-node');
        if (selectedNodeIds.has(nodeId)) group.classList.add('selected');
        group.setAttribute('transform', `translate(${node.x} ${node.y})`);
        const input = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        input.classList.add('port', 'input');
        input.dataset.nodeId = nodeId; input.dataset.port = '0';
        input.setAttribute('cx', '-8'); input.setAttribute('cy', '0'); input.setAttribute('r', '4');
        const output = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        output.classList.add('port', 'output');
        output.dataset.nodeId = nodeId; output.dataset.port = '0';
        output.setAttribute('cx', '8'); output.setAttribute('cy', '0'); output.setAttribute('r', '4');
        [input, output].forEach(port => port.addEventListener('mousedown', event => {
            if (event.button !== 0) return;
            event.stopPropagation(); event.preventDefault();
            if (event.altKey) {
                deleteRerouteNode(nodeId);
                return;
            }
            sourcePortEl = port;
            activeDrawingWaypoints = [];
            branchOriginWaypoint = null;
            rerouteConnectionStart = null;
            activeDrawingLine = newDrawingLine();
            appendWirePath(activeDrawingLine);
        }));
        const handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        handle.dataset.role = 'handle';
        handle.setAttribute('cx', '0'); handle.setAttribute('cy', '0'); handle.setAttribute('r', '6');
        handle.setAttribute('fill', '#6b7280'); handle.setAttribute('stroke', '#374151');
        const handleHitTarget = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        handleHitTarget.dataset.role = 'hit-target';
        handleHitTarget.setAttribute('cx', '0'); handleHitTarget.setAttribute('cy', '0'); handleHitTarget.setAttribute('r', '11');
        handleHitTarget.setAttribute('fill', 'transparent');
        const handleMouseDown = event => {
            if (event.button !== 0) return;
            event.stopPropagation(); event.preventDefault();
            if (event.altKey) {
                deleteRerouteNode(nodeId);
                return;
            }
            if (!event.shiftKey && !selectedNodeIds.has(nodeId)) clearSelection();
            selectNode(nodeId, true);
            const graphItems = [...selectedNodeIds]
                .filter(id => nodesData[id]?.type === 'reroute')
                .map(id => ({ id, x: Number(nodesData[id].x), y: Number(nodesData[id].y) }));
            waypointDrag = { graphNodeId: nodeId, graphItems, clientX: event.clientX, clientY: event.clientY, start: getCanvasPoint(event), moved: false };
        };
        handle.addEventListener('mousedown', handleMouseDown);
        handleHitTarget.addEventListener('mousedown', handleMouseDown);
        group.append(handleHitTarget, input, output, handle);
        wireHandlesLayer.appendChild(group);
    });
    connections.forEach(conn => {
        if (pendingPortRelink?.connectionIds.includes(conn.id)) return;
        const fromNodeEl = document.getElementById(conn.fromNode);
        const toNodeEl = document.getElementById(conn.toNode);
        if (!fromNodeEl || !toNodeEl) return;
        const fromPortEl = fromNodeEl.querySelector(`.port.output[data-port="${conn.fromPort}"]`);
        const toPortEl = toNodeEl.querySelector(`.port.input[data-port="${conn.toPort}"]`);
        if (!fromPortEl || !toPortEl) return;
        let p1 = calculatePortAbsolutePos(fromPortEl);
        const p2 = calculatePortAbsolutePos(toPortEl);
        const segmentPoints = [p1, p2];
        for (let segmentIndex = 0; segmentIndex < segmentPoints.length - 1; segmentIndex++) {
            if (conn.brokenSegments?.includes(segmentIndex)) continue;
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.id = `conn-path-${conn.id}-${segmentIndex}`;
            path.setAttribute('data-conn-id', conn.id);
            path.setAttribute('data-segment-index', segmentIndex);
            path.setAttribute('d', buildWirePath(segmentPoints[segmentIndex], segmentPoints[segmentIndex + 1]));
            path.setAttribute('stroke', '#7a8274');
            path.setAttribute('stroke-width', '3');
            path.setAttribute('fill', 'none');
            if (selectedConnectionSegment?.connId === conn.id && selectedConnectionSegment.segmentIndex === segmentIndex) {
                path.classList.add('selected-wire-segment');
            }
            path.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!e.altKey) {
                    selectedConnectionSegment = { connId: conn.id, segmentIndex };
                    document.querySelectorAll('path.selected-wire-segment').forEach(item => item.classList.remove('selected-wire-segment'));
                    path.classList.add('selected-wire-segment');
                    return;
                }
                const affectedOutput = connectionAffectsOutput(conn);
                selectedConnectionSegment = null;
                if ((conn.waypoints?.length || 0) > 0) {
                    conn.brokenSegments = Array.from(new Set([...(conn.brokenSegments || []), segmentIndex])).sort((a, b) => a - b);
                } else {
                    connections = connections.filter(c => c.id !== conn.id);
                    if (isWideMathType(nodesData[conn.toNode]?.type)) refreshNodeDOM(conn.toNode);
                }
                renderConnections();
                updateSignalMonitors();
                markCircuitDirty(affectedOutput);
            });
            // Double-click inserts the reroute point into the selected segment.
            path.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                const pt = getCanvasPoint(e);
                splitLinkWithReroute(conn, pt.x, pt.y);
                selectedConnectionSegment = null;
                renderConnections();
                markCircuitDirty(nodeReachesOutput(conn.toNode));
            });
            appendWirePath(path);
        }
        // Render waypoint handle circles
        if (conn.waypoints && conn.waypoints.length > 0) {
            conn.waypoints.forEach((wp, wi) => {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', wp.x);
                circle.setAttribute('cy', wp.y);
                circle.setAttribute('r', '5');
                circle.setAttribute('fill', '#f59e0b');
                circle.setAttribute('stroke', '#92400e');
                circle.setAttribute('stroke-width', '1.5');
                circle.setAttribute('data-conn-id', conn.id);
                circle.setAttribute('data-wp-index', wi);
                const rerouteKey = waypointKey(conn.id, wi);
                if (selectedWaypointKeys.has(rerouteKey)) circle.classList.add('reroute-selected');
                circle.setAttribute('aria-label', '连线重路由点：拖动移动，Alt+点击删除');
                circle.setAttribute('title', '拖动移动；右侧小端点拖出分支；Alt+点击删除');
                circle.style.cursor = 'move';
                // The handle works like an Unreal reroute pin: drag to reposition;
                // click-release once, then drag to an input to create a branch.
                circle.addEventListener('mousedown', e2 => {
                    if (e2.button !== 0) return;
                    e2.stopPropagation(); e2.preventDefault();
                    if (e2.altKey) {
                        conn.waypoints.splice(wi, 1);
                        if (conn.waypoints.length === 0) delete conn.waypoints;
                        renderConnections();
                        markDirty();
                        return;
                    }
                    if (!selectedWaypointKeys.has(rerouteKey)) {
                        if (!e2.shiftKey) clearSelection();
                        selectedWaypointKeys.add(rerouteKey);
                    }
                    const start = getCanvasPoint(e2);
                    const items = [];
                    connections.forEach(candidate => (candidate.waypoints || []).forEach((candidateWp, candidateWi) => {
                        if (selectedWaypointKeys.has(waypointKey(candidate.id, candidateWi))) {
                            items.push({ wp: candidateWp, x: candidateWp.x, y: candidateWp.y });
                        }
                    }));
                    waypointDrag = { conn, wi, wp, clientX: e2.clientX, clientY: e2.clientY, start, items, moved: false };
                });
                appendWireHandle(circle);
                const inputPort = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                inputPort.classList.add('reroute-input-port');
                inputPort.setAttribute('cx', wp.x - 8);
                inputPort.setAttribute('cy', wp.y);
                inputPort.setAttribute('r', '3.5');
                inputPort.setAttribute('fill', '#f8fafc');
                inputPort.setAttribute('stroke', '#475569');
                inputPort.setAttribute('stroke-width', '1.5');
                inputPort.setAttribute('data-connection-id', conn.id);
                inputPort.setAttribute('data-waypoint-index', wi);
                inputPort.setAttribute('title', '重路由输入端：可接回断开的线段');
                appendWireHandle(inputPort);
                const branchPort = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                branchPort.classList.add('reroute-branch-port');
                branchPort.setAttribute('cx', wp.x + 8);
                branchPort.setAttribute('cy', wp.y);
                branchPort.setAttribute('r', '3.5');
                branchPort.setAttribute('fill', '#f8fafc');
                branchPort.setAttribute('stroke', '#475569');
                branchPort.setAttribute('stroke-width', '1.5');
                branchPort.setAttribute('data-connection-id', conn.id);
                branchPort.setAttribute('data-waypoint-index', wi);
                branchPort.setAttribute('title', '从此端点拖出分支');
                const beginRerouteConnection = (e2, side) => {
                    if (e2.button !== 0) return;
                    e2.stopPropagation(); e2.preventDefault();
                    const endpointNodeId = side === 'output' ? conn.fromNode : conn.toNode;
                    const endpointDirection = side === 'output' ? 'output' : 'input';
                    const endpointPort = side === 'output' ? conn.fromPort : conn.toPort;
                    const endpointNodeEl = document.getElementById(endpointNodeId);
                    const srcPortEl = endpointNodeEl?.querySelector(`.port.${endpointDirection}[data-port="${endpointPort}"]`);
                    if (!srcPortEl || activeDrawingLine) return;
                    sourcePortEl = srcPortEl;
                    activeDrawingAnchor = { x: wp.x, y: wp.y };
                    branchOriginWaypoint = side === 'output' ? { connectionId: conn.id, waypointIndex: wi } : null;
                    rerouteConnectionStart = { connectionId: conn.id, waypointIndex: wi, side };
                    activeDrawingWaypoints = [];
                    activeDrawingLine = newDrawingLine();
                    appendWirePath(activeDrawingLine);
                    activeDrawingLine.setAttribute('d', buildWirePath(activeDrawingAnchor, activeDrawingAnchor));
                };
                inputPort.addEventListener('mousedown', e2 => beginRerouteConnection(e2, 'input'));
                branchPort.addEventListener('mousedown', e2 => beginRerouteConnection(e2, 'output'));
                appendWireHandle(branchPort);
            });
        }
    });
    refreshPortSignalKinds();
    updateLiveSignals();
}

function getPortSignalKind(nodeId, direction, portIndex, visited = new Set()) {
    const visitKey = `${nodeId}:${direction}:${portIndex}`;
    if (visited.has(visitKey)) return null;
    visited.add(visitKey);
    if (nodesData[nodeId]?.type === 'reroute') {
        const incoming = connections.find(conn => conn.toNode === nodeId && parsePortIndex(conn.toPort) === 0);
        return incoming ? getPortSignalKind(incoming.fromNode, 'output', parsePortIndex(incoming.fromPort), visited) : null;
    }
    if (direction === 'output') return nodeMeta[nodesData[nodeId]?.type]?.signalKind || 'continuous';
    const incoming = connections.find(conn => isConnectionActive(conn) && conn.toNode === nodeId && parsePortIndex(conn.toPort) === portIndex);
    return incoming ? getPortSignalKind(incoming.fromNode, 'output', parsePortIndex(incoming.fromPort), visited) : null;
}

function refreshPortSignalKinds() {
    Object.entries(nodesData).forEach(([nodeId]) => {
        const nodeEl = document.getElementById(nodeId);
        if (!nodeEl) return;
        nodeEl.querySelectorAll('.port').forEach(port => {
            const direction = port.classList.contains('output') ? 'output' : 'input';
            const index = parsePortIndex(port.dataset.port);
            const kind = getPortSignalKind(nodeId, direction, index);
            port.classList.toggle('signal-pulse', kind === 'pulse');
            port.classList.toggle('signal-continuous', kind === 'continuous');
            const label = port.dataset.label || '';
            port.title = kind ? `${label}${label ? ' · ' : ''}${t(kind === 'pulse' ? 'pulseSignal' : 'continuousSignal')}` : label;
        });
    });
}

window.deleteNode = function(id) {
    const affectedOutput = nodeReachesOutput(id);
    document.getElementById(id)?.remove();
    connections = connections.filter(conn => conn.fromNode !== id && conn.toNode !== id);
    delete nodesData[id];
    selectedNodeIds.delete(id);
    renderConnections();
    updateSignalMonitors();
    markCircuitDirty(affectedOutput);
};

function persistLayout() {
    localStorage.setItem(storageKey, buildLayoutJson());
}

function buildLayoutJson() {
    return JSON.stringify({ version: GRAPH_FORMAT_VERSION, nodesData, connections, nodeIdCounter, connectionIdCounter, canvasZoom, canvasPanX, canvasPanY });
}

function buildHistoryJson() {
    return JSON.stringify({ version: GRAPH_FORMAT_VERSION, nodesData, connections, nodeIdCounter, connectionIdCounter });
}

function recordHistoryState(reset = false) {
    if (historyRestoring) return;
    const snapshot = buildHistoryJson();
    if (reset) {
        undoHistory = [snapshot];
        redoHistory = [];
        return;
    }
    if (undoHistory[undoHistory.length - 1] === snapshot) return;
    undoHistory.push(snapshot);
    if (undoHistory.length > HISTORY_LIMIT) undoHistory.shift();
    redoHistory = [];
}

function restoreHistorySnapshot(snapshot) {
    if (!snapshot) return false;
    const viewport = { zoom: canvasZoom, panX: canvasPanX, panY: canvasPanY };
    historyRestoring = true;
    try {
        if (!loadLayoutState(JSON.parse(snapshot), false)) return false;
        canvasZoom = viewport.zoom;
        canvasPanX = viewport.panX;
        canvasPanY = viewport.panY;
        canvas.style.setProperty('--canvas-zoom', canvasZoom);
        canvas.style.setProperty('--canvas-pan-x', `${canvasPanX}px`);
        canvas.style.setProperty('--canvas-pan-y', `${canvasPanY}px`);
        zoomBadge.textContent = `${Math.round(canvasZoom * 100)}%`;
        renderConnections();
        persistLayout();
        statusEl.textContent = t('unsaved');
        resetPreviewRuntimeState();
        requestRuntimeReset();
        scheduleAutoSave();
        return true;
    } finally {
        historyRestoring = false;
    }
}

function undoGraphStep() {
    if (undoHistory.length < 2) return false;
    const current = undoHistory.pop();
    redoHistory.push(current);
    return restoreHistorySnapshot(undoHistory[undoHistory.length - 1]);
}

function redoGraphStep() {
    if (!redoHistory.length) return false;
    const snapshot = redoHistory.pop();
    if (!restoreHistorySnapshot(snapshot)) return false;
    undoHistory.push(snapshot);
    if (undoHistory.length > HISTORY_LIMIT) undoHistory.shift();
    return true;
}

function restoreLayout(layoutJson) {
    const saved = layoutJson || localStorage.getItem(storageKey);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            return loadLayoutState(data, true);
        } catch {
            if (!layoutJson) localStorage.removeItem(storageKey);
        }
    }
    return false;
}

function loadLayoutState(data, persistLocal) {
    if (!Number(data?.version) || Number(data.version) < 1 || Number(data.version) > GRAPH_FORMAT_VERSION) {
        createDefaultGraph();
        return true;
    }
    document.querySelectorAll('.node').forEach(node => node.remove());
    nodesData = data.nodesData || {};
    connections = data.connections || [];
    nodeIdCounter = data.nodeIdCounter || 0;
    connectionIdCounter = data.connectionIdCounter || 0;
    clearSelection();
    if (!historyRestoring) {
        setCanvasZoom(data.canvasZoom || 1);
        setCanvasPan(data.canvasPanX || 0, data.canvasPanY || 0);
    }
    Object.entries(nodesData).forEach(([id, node]) => {
        if (node.type === 'reroute') return;
        const size = node.type === 'group'
            ? getGroupSize(id)
            : getNodeVisualSize(node.type, id);
        const pos = clampToWorkspace(node.x, node.y, size.width, size.height);
        node.x = pos.x;
        node.y = pos.y;
    });
    Object.entries(nodesData).forEach(([id, node]) => {
        if (node.type === 'reroute') return;
        const el = createNodeDOM(id, node.type, node.x, node.y);
        if (el) nodeLayer.appendChild(el);
    });
    renderConnections();
    updateSignalMonitors();
    if (persistLocal) persistLayout();
    return Object.keys(nodesData).length > 0;
}

function createDefaultGraph() {
    document.querySelectorAll('.node').forEach(node => node.remove());
    clearSelection();
    setCanvasZoom(1);
    setCanvasPan(0, 0);
    nodesData = {
        node_out: { type: 'output', x: 520, y: 180 }
    };
    connections = [];
    nodeIdCounter = 10;
    connectionIdCounter = 10;
    Object.entries(nodesData).forEach(([id, node]) => nodeLayer.appendChild(createNodeDOM(id, node.type, node.x, node.y)));
    renderConnections();
    updateSignalMonitors();
    persistLayout();
}

if (liveSignal) { liveSignalBtn.classList.add('live-on'); container.classList.add('live-active'); }
liveSignalBtn.addEventListener('click', () => {
    liveSignal = !liveSignal;
    liveSignalBtn.classList.toggle('live-on', liveSignal);
    container.classList.toggle('live-active', liveSignal);
    localStorage.setItem(LIVE_SIGNAL_KEY, liveSignal ? '1' : '0');
    updateLiveSignals();
});

function getGameOutputSignalValue() {
    const value = Number(serverState?.OutputSignalValue ?? serverState?.outputSignalValue ?? gameOutputSignal ?? 0);
    return Number.isFinite(value) ? Math.max(0, Math.min(15, Math.floor(value))) : 0;
}

function getRuntimeNodeOutputValue(nodeId, outputPortIndex) {
    const values = serverState?.NodeOutputValues ?? serverState?.nodeOutputValues;
    if (!values || typeof values !== 'object') return null;
    const runtimeNodeId = normalizeNodeId(nodeId, nodesData[nodeId]?.type);
    const key = `${runtimeNodeId}:${outputPortIndex}`;
    if (!Object.prototype.hasOwnProperty.call(values, key)) return null;
    const value = Number(values[key]);
    return Number.isFinite(value) ? value : null;
}

function getLiveNodeOutputValue(nodeId, outputPortIndex) {
    const runtimeValue = getRuntimeNodeOutputValue(nodeId, outputPortIndex);
    return runtimeValue === null ? evaluatePreviewNode(nodeId, outputPortIndex, 0) : runtimeValue;
}

function getLiveConnectionValue(conn) {
    if (nodesData[conn.toNode]?.type === 'output') {
        const bit = Math.max(0, Math.min(3, parsePortIndex(conn.toPort)));
        return (getGameOutputSignalValue() >> bit) & 1;
    }
    const source = resolveRuntimeSource(conn.fromNode, conn.fromPort);
    if (!source) return 0;
    return getLiveNodeOutputValue(source.nodeId, parsePortIndex(source.port));
}

function updateLiveSignals(resetPreview = true) {
    const ownsPreviewCache = !previewEvalCache;
    if (ownsPreviewCache) {
        previewEvalCache = new Map();
        previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
        previewCanMutateState = false;
    }
    try {
    document.querySelectorAll('.port.output').forEach(p => p.classList.remove('active-out'));
    document.querySelectorAll('.port.input').forEach(p => p.classList.remove('active-in'));
    document.querySelectorAll('.conn-live').forEach(c => c.classList.remove('conn-live'));
    if (!liveSignal) return;
    const connectedOutputPorts = new Set();
    connections.forEach(conn => {
        if (!isConnectionActive(conn)) return;
        const outputPortIndex = parsePortIndex(conn.fromPort);
        connectedOutputPorts.add(`${conn.fromNode}:${outputPortIndex}`);
        if (!isPreviewTrue(getLiveConnectionValue(conn))) return;
        document.querySelectorAll(`path[data-conn-id="${conn.id}"]`).forEach(path => path.classList.add('conn-live'));
        document.getElementById(conn.fromNode)?.querySelector(`.port.output[data-port="${conn.fromPort}"]`)?.classList.add('active-out');
        document.getElementById(conn.toNode)?.querySelector(`.port.input[data-port="${conn.toPort}"]`)?.classList.add('active-in');
    });
    // Default inputs (for example a checked SEL branch) are real live values too,
    // even though there is no wire that would otherwise mark the input port active.
    Object.entries(nodesData).forEach(([id, node]) => {
        const meta = nodeMeta[node.type];
        if (!meta) return;
        const renderMeta = buildRenderMeta(node.type, id, meta);
        for (let pi = 0; pi < Number(renderMeta.inputs || 0); pi++) {
            const hasWire = connections.some(conn => isConnectionActive(conn) && conn.toNode === id && parsePortIndex(conn.toPort) === pi);
            if (hasWire || !isPreviewTrue(evaluatePreviewInput(id, pi, 0))) continue;
            document.getElementById(id)?.querySelector(`.port.input[data-port="in-${pi}"]`)?.classList.add('active-in');
        }
    });
    Object.entries(nodesData).forEach(([id, node]) => {
        const meta = nodeMeta[node.type];
        if (!meta || !meta.outputs) return;
        const el = document.getElementById(id);
        if (!el) return;
        for (let pi = 0; pi < meta.outputs; pi++) {
            if (connectedOutputPorts.has(`${id}:${pi}`)) continue;
            const val = getLiveNodeOutputValue(id, pi);
            if (isPreviewTrue(val)) {
                const port = el.querySelector(`.port.output[data-port="out-${pi}"]`);
                if (port) port.classList.add('active-out');
            }
        }
    });
    updatePreviewStateNotes();
    } finally {
        if (ownsPreviewCache) {
            previewEvalCache = null;
            previewStableOutputSnapshot = null;
            previewCanMutateState = false;
        }
    }
}

function updatePreviewStateNotes() {
    document.querySelectorAll('.node').forEach(el => {
        const id = el.id;
        const node = nodesData[id];
        if (!node) return;
        const note = el.querySelector('.node-note');
        if (!note) return;
        if (node.type === 'delay') {
            if (!node._delayInput) { note.innerHTML = t('idle'); return; }
            const remaining = (node._delayRemaining ?? 0) / 1000;
            const done = remaining <= 0;
            note.innerHTML = done ? `<span style="color:#16a34a">${t('delayed')}</span>` : `<span style="color:#b45309">${t('delaying')} ${remaining.toFixed(1)}s</span>`;
        } else if (node.type === 'pulse-shaper') {
            if (node._pulseHold) { note.innerHTML = `<span style="color:#16a34a">${t('active')}</span>`; return; }
            const remaining = (node._pulseRemaining ?? 0) / 1000;
            note.innerHTML = remaining > 0 ? `<span style="color:#b45309">${t('holding')} ${remaining.toFixed(1)}s</span>` : t('idle');
        }
    });
}

function updateSignalMonitors() {
    const ownsPreviewCache = !previewEvalCache;
    if (ownsPreviewCache) {
        previewEvalCache = new Map();
        previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
        previewCanMutateState = false;
    }
    try {
    updateCounterDisplays();
    Object.entries(nodesData).forEach(([id, node]) => {
        if (node.type !== 'test-signal') return;
        const conn = connections.find(c => isConnectionActive(c) && c.toNode === id && parsePortIndex(c.toPort) === 0);
        const srcType = conn ? nodesData[conn.fromNode]?.type : null;
        const runtimeValue = conn ? getRuntimeNodeOutputValue(conn.fromNode, parsePortIndex(conn.fromPort)) : null;
        const value = (srcType === 'output')
            ? getGameOutputSignalValue()
            : (runtimeValue === null ? evaluatePreviewInput(id, 0, 0) : runtimeValue);
        const active = Math.abs(value) > 0.0001;
        const nodeEl = document.getElementById(id);
        const stateEl = nodeEl?.querySelector('.signal-state');
        const valueEl = nodeEl?.querySelector('.signal-value');
        if (stateEl) {
            stateEl.textContent = active ? t('signalGreen') : t('signalRed');
            stateEl.classList.toggle('active', active);
        }
        if (valueEl) {
            valueEl.textContent = formatPreviewValue(value, findPreviewInputType(id, 0));
            valueEl.title = String(value);
        }
        const numericValue = Number(value) || 0;
        const previousValue = node._monitorPreviousValue;
        const delta = previousValue === undefined ? 0 : numericValue - previousValue;
        node._monitorPreviousValue = numericValue;
        node._monitorValue = numericValue;
        node._monitorMin = node._monitorMin === undefined ? numericValue : Math.min(node._monitorMin, numericValue);
        node._monitorMax = node._monitorMax === undefined ? numericValue : Math.max(node._monitorMax, numericValue);
        node._monitorSamples = (node._monitorSamples || 0) + 1;
        if (previousValue !== undefined && Math.abs(delta) > 0.0001) node._monitorLastChangedAt = Date.now();
        const details = nodeEl?.querySelector('.signal-details');
        if (details) {
            const sourceEl = details.querySelector('.signal-source');
            const sourceName = conn ? (nodeMeta[srcType]?.title || srcType || conn.fromNode) : '未连接';
            const sourcePort = conn ? parsePortIndex(conn.fromPort) : 0;
            if (sourceEl) sourceEl.textContent = conn ? `${sourceName} · 端口 ${sourcePort}` : sourceName;
        }
    });
    // Pixel screen display (re-render from cached eval)
    Object.entries(nodesData).forEach(([id, node]) => {
        if (node.type === 'pixel-screen') {
            const val = getLiveNodeOutputValue(id, 0);
            updatePixelScreen(id, val);
        }
    });
    updatePreviewStateNotes();
    updateLiveSignals(false);
    } finally {
        if (ownsPreviewCache) {
            previewEvalCache = null;
            previewStableOutputSnapshot = null;
            previewCanMutateState = false;
        }
    }
}

function formatMonitorNumber(value) {
    const number = Number(value) || 0;
    return Math.abs(number) >= 1000000 || (Math.abs(number) > 0 && Math.abs(number) < 0.001)
        ? number.toExponential(3)
        : Number(number.toFixed(4)).toString();
}


function advancePreviewStateRound() {
    if (previewEvalCache) return;
    previewEvalCache = new Map();
    previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
    previewCanMutateState = true;
    try {
        Object.entries(nodesData).forEach(([id, node]) => {
            const meta = nodeMeta[node.type];
            if (!meta || !meta.outputs) return;
            for (let pi = 0; pi < meta.outputs; pi++) {
                evaluatePreviewNode(id, pi, 0);
            }
        });
    } finally {
        previewCanMutateState = false;
        previewEvalCache = null;
        previewStableOutputSnapshot = null;
    }
}

function scheduleSignalRefresh() {
    if (signalRefreshFrame) return;
    signalRefreshFrame = requestAnimationFrame(() => {

function currentSignalRefreshDelay() {

function currentPreviewRefreshDelay() {

function currentFullStateRefreshDelay() {

function schedulePreviewLoop() {

function findPreviewInputType(nodeId, portIndex) {
    const input = connections.find(conn => isConnectionActive(conn) && conn.toNode === nodeId && parsePortIndex(conn.toPort) === portIndex);
    return input ? nodesData[input.fromNode]?.type || '' : '';
}

function evaluatePreviewInput(nodeId, portIndex, depth) {
    const input = connections.find(conn => isConnectionActive(conn) && conn.toNode === nodeId && parsePortIndex(conn.toPort) === portIndex);
    if (!input && isWideMathType(nodesData[nodeId]?.type)) return getWideMathInputDefault(nodeId, portIndex);
    return input ? evaluatePreviewNode(input.fromNode, parsePortIndex(input.fromPort), depth + 1) : 0;
}

function evaluatePreviewInputs(nodeId, count, depth) {
    const total = Math.max(0, Number(count || 0));
    const values = [];
    for (let i = 0; i < total; i++) {
        const input = connections.find(conn => isConnectionActive(conn) && conn.toNode === nodeId && parsePortIndex(conn.toPort) === i);
        if (!input) {
            values.push(isWideMathType(nodesData[nodeId]?.type) ? getWideMathInputDefault(nodeId, i) : 0);
            continue;
        }
        values.push(evaluatePreviewNode(input.fromNode, parsePortIndex(input.fromPort), depth + 1));
    }
    return values;
}

// ===== Evaluation Engine (JS preview — must match C# switch) =====
// For each module, JS preview logic should mirror C# EvaluateRuntimeNumber switch
function evaluatePreviewNode(nodeId, outputPortIndex, depth = 0) {
    const cacheKey = `${nodeId}:${outputPortIndex}`;
    if (previewEvalStack.has(cacheKey)) return getPreviewStableOutput(nodeId, outputPortIndex);
    if (previewEvalCache && previewEvalCache.has(cacheKey)) return previewEvalCache.get(cacheKey);
    previewEvalStack.add(cacheKey);
    let result = 0;
    try {
        result = evaluatePreviewNodeUncached(nodeId, outputPortIndex, depth);
    } finally {
        previewEvalStack.delete(cacheKey);
    }
    if (previewEvalCache) previewEvalCache.set(cacheKey, result);
    return result;
}

function buildPreviewStableOutputSnapshot() {
    const snapshot = new Map();
    Object.entries(nodesData).forEach(([id, node]) => {
        if (!node) return;
        if (node.type === 'counter') snapshot.set(`${id}:0`, node._counterValue || 0);
        else if (node.type === 'sequence') {
            const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
            const step = Math.max(0, Math.min(values.length - 1, Number(node._seqStep || 0)));
            snapshot.set(`${id}:0`, Math.max(0, Math.min(15, Math.floor(Number(values[step] || 0)))));
            snapshot.set(`${id}:1`, step);
        } else if (node.type === 'latch') snapshot.set(`${id}:0`, node._latchState ? 1 : 0);
        else if (node.type === 'toggle') snapshot.set(`${id}:0`, node._togState ? 1 : 0);
        else if (node.type === 'hysteresis') snapshot.set(`${id}:0`, node._hystState ? 1 : 0);
        else if (node.type === 'pulse-shaper') snapshot.set(`${id}:0`, (node._pulseHold || (node._pulseRemaining || 0) > 0) ? 1 : 0);
    });
    return snapshot;
}

function getPreviewStableOutput(nodeId, outputPortIndex) {
    const cacheKey = `${nodeId}:${outputPortIndex}`;
    if (previewStableOutputSnapshot?.has(cacheKey)) return previewStableOutputSnapshot.get(cacheKey);
    const node = nodesData[nodeId];
    if (!node) return 0;
    if (node.type === 'counter') return node._counterValue || 0;
    if (node.type === 'sequence') {
        const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
        const step = Math.max(0, Math.min(values.length - 1, Number(node._seqStep || 0)));
        return outputPortIndex === 1 ? step : Math.max(0, Math.min(15, Math.floor(Number(values[step] || 0))));
    }
    if (node.type === 'latch') return node._latchState ? 1 : 0;
    if (node.type === 'toggle') return node._togState ? 1 : 0;
    if (node.type === 'hysteresis') return node._hystState ? 1 : 0;
    if (node.type === 'pulse-shaper') return (node._pulseHold || (node._pulseRemaining || 0) > 0) ? 1 : 0;
    return 0;
}

function isPreviewStatefulType(type) {
    return ['counter', 'sequence', 'delay', 'number-changed', 'latch', 'edge-pulse', 'material-change', 'hysteresis', 'toggle', 'pulse-shaper'].includes(type);
}

function evaluatePreviewNodeUncached(nodeId, outputPortIndex, depth = 0) {
    if (depth > 32) return 0;
    const node = nodesData[nodeId];
    if (!node) return 0;
    const type = node.type;
    if (!previewCanMutateState && isPreviewStatefulType(type)) return getPreviewStableOutput(nodeId, outputPortIndex);
    if (type === 'counter') return evaluatePreviewCounterNode(nodeId, node, depth);
    const a = evaluatePreviewInput(nodeId, 0, depth + 1);
    const b = evaluatePreviewInput(nodeId, 1, depth + 1);
    if (type === 'material') return getSelectedMaterialAmountForPreview();
    if (type === 'constant') return Number(node.value ?? currentNodeInputValue(nodeId, 'value', 100));
    if (type === 'number-changed') {
        if (node._numberChangeTick !== simTick) {
            const previous = node._numberChangeValue;
            let flags = 0;
            if (previous !== undefined) {
                if (a > previous + 0.0001) flags |= 1;
                else if (a < previous - 0.0001) flags |= 2;
                if (flags) flags |= 4;
            }
            node._numberChangeValue = a;
            node._numberChangeFlags = flags;
            node._numberChangeTick = simTick;
        }
        return ((node._numberChangeFlags || 0) & (1 << outputPortIndex)) !== 0 ? 1 : 0;
    }
    if (type === 'material-low') return getSelectedMaterialAmountForPreview() < Math.max(0, Number(node.value || 100)) ? 1 : 0;
    if (type === 'material-high') return getSelectedMaterialAmountForPreview() >= Math.max(0, Number(node.value || 100)) ? 1 : 0;
    if (type === 'logic-gt') return a > b ? 1 : 0;
    if (type === 'logic-lt') return a < b ? 1 : 0;
    if (type === 'logic-eq') return Math.abs(a - b) < 0.0001 ? 1 : 0;
    if (type === 'logic-range') {
        const c = evaluatePreviewInput(nodeId, 2, depth + 1);
        return a >= Math.min(b, c) && a <= Math.max(b, c) ? 1 : 0;
    }
    if (type === 'math-add') return evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth).reduce((sum, value) => sum + value, 0);
    if (type === 'math-subtract') {
        const values = evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth);
        return values.slice(1).reduce((result, value) => result - value, values[0] || 0);
    }
    if (type === 'math-multiply') return evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth).reduce((result, value) => result * value, 1);
    if (type === 'math-divide') {
        const values = evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth);
        return values.slice(1).reduce((result, value) => Math.abs(value) < 0.0001 ? 0 : result / value, values[0] || 0);
    }
    if (type === 'math-mod') return Math.abs(b) < 0.0001 ? 0 : a % b;
    if (type === 'math-clamp') {
        const c = evaluatePreviewInput(nodeId, 2, depth + 1);
        return Math.min(Math.max(a, Math.min(b, c)), Math.max(b, c));
    }
    if (type === 'math-negate') return -a;
    if (type === 'math-min') return Math.min(a, b);
    if (type === 'math-max') return Math.max(a, b);
    if (type === 'bool-and') return isPreviewTrue(a) && isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-nand') return isPreviewTrue(a) && isPreviewTrue(b) ? 0 : 1;
    if (type === 'bool-or') return isPreviewTrue(a) || isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-nor') return isPreviewTrue(a) || isPreviewTrue(b) ? 0 : 1;
    if (type === 'bool-xor') return isPreviewTrue(a) !== isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-not') return isPreviewTrue(a) ? 0 : 1;
    if (type === 'bool-selector') return isPreviewTrue(a) ? b : evaluatePreviewInput(nodeId, 2, depth + 1);
    if (type === 'bool-true') return 1;
    if (type === 'bool-false') return 0;
    if (type === 'inventory-percent') return getInventoryPercentForPreview();
    if (type === 'inventory-stored') return getServerNumber('TotalStoredKg', 'totalStoredKg');
    if (type === 'inventory-remaining') return Math.max(0, getServerNumber('TotalCapacityKg', 'totalCapacityKg') - getServerNumber('TotalStoredKg', 'totalStoredKg'));
    if (type === 'inventory-capacity') return getServerNumber('TotalCapacityKg', 'totalCapacityKg');
    if (type === 'power-percent') return getPowerPercentForPreview();
    if (type === 'power-stored') return getServerNumber('PowerStoredJoules', 'powerStoredJoules');
    if (type === 'power-remaining') return getServerNumber('PowerRemainingJoules', 'powerRemainingJoules');
    if (type === 'power-capacity') return getServerNumber('PowerCapacityJoules', 'powerCapacityJoules');
    if (type === 'building-status') {
        const building = getSelectedBuilding(nodeId);
        return building && (building.Operational ?? building.operational) ? 1 : 0;
    }
    if (type === 'building-signal') {
        const building = getSelectedBuilding(nodeId);
        return building ? getBuildingSignalValue(building) : 0;
    }
    if (type === 'sequence') {
        const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
        const advanceValue = a;
        const resetValue = b;
        const advanceActive = isPreviewTrue(advanceValue);
        const prevAdvance = node._seqPrevAdvance || false;
        node._seqPrevAdvance = advanceActive;
        const resetActive = isPreviewTrue(resetValue);
        const prevReset = node._seqPrevReset || false;
        node._seqPrevReset = resetActive;
        if (resetActive && !prevReset) {
            node._seqStep = 0;
        } else if (advanceActive && !prevAdvance) {
            node._seqStep = ((node._seqStep || 0) + 1) % values.length;
        }
        if (node._seqStep === undefined) node._seqStep = 0;
        if (outputPortIndex === 1) return node._seqStep;
        return Math.max(0, Math.min(15, Math.floor(Number(values[node._seqStep] || 0))));
    }
    if (type === 'split4') {
        const raw = Math.max(0, Math.min(15, Math.floor(Number(a || 0))));
        const bits = [raw & 1, (raw >> 1) & 1, (raw >> 2) & 1, (raw >> 3) & 1];
        return bits[Math.min(3, Math.max(0, outputPortIndex))] || 0;
    }
    if (type === 'merge4') {
        let v = 0;
        for (let i = 0; i < 4; i++) {
            if (isPreviewTrue(evaluatePreviewInput(nodeId, i, depth + 1))) v |= 1 << i;
        }
        return v;
    }
    if (type === 'select') {
        const count = Math.max(2, Math.min(12, Math.floor(Number(node.portCount ?? node.value ?? 6))));
        const sel = Math.floor(Math.max(0, evaluatePreviewInput(nodeId, 0, depth + 1)));
        return evaluatePreviewInput(nodeId, Math.min(sel, count - 1) + 1, depth + 1);
    }
    if (type === 'cycle4') return outputPortIndex === Math.floor(simTick / Math.max(1, Math.floor(Number(node.intervalSeconds || 5) * 5))) % 4 ? 1 : 0;
    if (type === 'timer') return simTick % Math.max(1, Math.floor(Number(node.intervalSeconds || 5) * 5)) === 0 ? 1 : 0;
    if (type === 'random') return Math.random() * 100 < Math.max(0, Math.min(100, Number(node.value ?? 50))) ? 1 : 0;
    if (type === 'delay') {
        const inputTrue = isPreviewTrue(a);
        node._delayInput = inputTrue;
        const intervalMs = Math.max(200, Number(node.intervalSeconds || 5) * 1000);
        if (!inputTrue) { node._delayStart = 0; return 0; }
        if (!node._delayStart) node._delayStart = Date.now();
        node._delayRemaining = Math.max(0, intervalMs - (Date.now() - node._delayStart));
        return node._delayRemaining <= 0 ? 1 : 0;
    }
    if (type === 'pulse-shaper') {
        const inputTrue = isPreviewTrue(a);
        node._pulseHold = inputTrue;
        const holdMs = Math.max(100, Number(node.minHoldSeconds || 1) * 1000);
        if (inputTrue) { node._pulseOffTime = 0; return 1; }
        if (!node._pulseOffTime) node._pulseOffTime = Date.now();
        node._pulseRemaining = Math.max(0, holdMs - (Date.now() - node._pulseOffTime));
        return node._pulseRemaining > 0 ? 1 : 0;
    }
    if (type === 'latch') {
        if (isPreviewTrue(b)) { node._latchState = false; return 0; }
        if (isPreviewTrue(a)) node._latchState = true;
        return (node._latchState || false) ? 1 : 0;
    }
    if (type === 'edge-pulse') {
        const cur2 = isPreviewTrue(a);
        const prev2 = node._edgePrev || false;
        node._edgePrev = cur2;
        return cur2 && !prev2 ? 1 : 0;
    }
    if (type === 'material-change') {
        const amt = getSelectedMaterialAmountForPreview();
        const prev3 = node._matChangePrev;
        node._matChangePrev = amt;
        return (prev3 !== undefined && Math.abs(prev3 - amt) > 0.0001) ? 1 : 0;
    }
    if (type === 'hysteresis') {
        const upper = Number(node.upper ?? 500);
        const lower = Number(node.lower ?? 200);
        const prevState = node._hystState === true;
        if (a >= upper) node._hystState = true;
        else if (a <= lower) node._hystState = false;
        else if (node._hystState === undefined) node._hystState = a > lower;
        return node._hystState ? 1 : 0;
    }
    if (type === 'toggle') {
        const prevInput = node._togPrevInput || false;
        const current = isPreviewTrue(a);
        node._togPrevInput = current;
        if (current && !prevInput) {
            node._togState = !(node._togState === true);
        }
        if (node._togState === undefined) node._togState = false;
        return node._togState ? 1 : 0;
    }
    if (type === 'map-range') {
        const inMin = Number(node.inMin ?? 0);
        const inMax = Number(node.inMax ?? 100);
        const outMin = Number(node.outMin ?? 0);
        const outMax = Number(node.outMax ?? 100);
        const range = inMax - inMin;
        if (Math.abs(range) < 0.0001) return outMin;
        const t = (a - inMin) / range;
        return outMin + Math.min(1, Math.max(0, t)) * (outMax - outMin);
    }
    if (type === 'pixel-screen') {
        updatePixelScreen(nodeId, a);
        return 0;
    }
    return 0;
}

function evaluatePreviewCounterNode(nodeId, node, depth) {
    const pulseValue = evaluatePreviewInput(nodeId, 0, depth + 1);
    const cur = isPreviewTrue(pulseValue);
    const prev = node._counterPrevPulse || false;
    const currentCount = node._counterValue || 0;
    const candidateCount = cur && !prev ? currentCount + 1 : currentCount;
    const resetActive = isPreviewTrue(evaluatePreviewInput(nodeId, 1, depth + 1));
    node._counterPrevPulse = cur;
    if (resetActive) {
        node._counterValue = 0;
        return 0;
    }
    node._counterValue = candidateCount;
    return candidateCount;
}

function currentNodeInputValue(nodeId, field, fallback) {
    return document.getElementById(nodeId)?.querySelector(`.num-input[data-field="${field}"]`)?.value ?? fallback;
}

function getSelectedMaterialAmountForPreview() {
    const material = getSelectedMaterial();
    return Number(material?.MassKg ?? material?.massKg ?? serverState.selectedMaterialAmountKg ?? serverState.SelectedMaterialAmountKg ?? 0);
}

function getInventoryPercentForPreview() {
    const stored = getServerNumber('TotalStoredKg', 'totalStoredKg');
    const capacity = getServerNumber('TotalCapacityKg', 'totalCapacityKg');
    return capacity > 0 ? Math.min(100, Math.max(0, stored / capacity * 100)) : 0;
}

function getPowerPercentForPreview() {
    const stored = getServerNumber('PowerStoredJoules', 'powerStoredJoules');
    const capacity = getServerNumber('PowerCapacityJoules', 'powerCapacityJoules');
    return capacity > 0 ? Math.min(100, Math.max(0, stored / capacity * 100)) : 0;
}

function getServerNumber(pascalName, camelName) {
    return Number(serverState[pascalName] ?? serverState[camelName] ?? 0);
}

function isPreviewTrue(value) {
    return Math.abs(Number(value || 0)) > 0.0001;
}

function formatPreviewValue(value, sourceType = '') {
    const number = Number(value || 0);
    if (!Number.isFinite(number)) return '0';
    if (sourceType.startsWith('power-')) return formatJoules(number);
    if (sourceType.startsWith('inventory-') && sourceType !== 'inventory-percent') return formatTons(number);
    if (Math.abs(number) >= 1000) return formatTons(number);
    if (Math.abs(number - Math.round(number)) < 0.0001) return String(Math.round(number));
    return number.toFixed(2);
}

function formatJoules(joules) {
    const amount = Math.max(0, Number(joules || 0));
    if (amount >= 1000000) return `${(amount / 1000000).toFixed(1)}MJ`;
    if (amount >= 1000) return `${(amount / 1000).toFixed(1)}kJ`;
    return `${amount.toFixed(0)}J`;
}

// ===== Blueprint Serialization =====
function resolveRuntimeSource(nodeId, port, visited = new Set()) {
    if (nodesData[nodeId]?.type !== 'reroute') return { nodeId, port };
    if (visited.has(nodeId)) return null;
    visited.add(nodeId);
    const incoming = connections.find(link => link.toNode === nodeId && parsePortIndex(link.toPort) === 0);
    return incoming ? resolveRuntimeSource(incoming.fromNode, incoming.fromPort, visited) : null;
}

function buildRuntimeBlueprintJson() {
    const nodes = [];
    Object.entries(nodesData).forEach(([id, node]) => {
        const meta = nodeMeta[node.type];
        if (!meta) return;
        const runtimeNode = { Id: normalizeNodeId(id, node.type), Module: meta.module };
        if (meta.card?.layout === 'wide-math') {
            runtimeNode.InputCount = getWideMathInputCount(id);
            runtimeNode.InputValues = ensureWideMathInputValues(id).slice(0, runtimeNode.InputCount).map(value => Number(value || 0));
        }
        if (node.type === 'timer' || node.type === 'cycle4' || node.type === 'delay') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="intervalSeconds"]')?.value;
            runtimeNode.IntervalSeconds = Math.max(0.2, Number(inputValue || node.intervalSeconds || 5));
        }
        if (node.type === 'constant' || node.type === 'material-low' || node.type === 'material-high' || node.type === 'random') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="value"]')?.value;
            const fallback = node.type === 'random' ? 50 : 100;
            const maxValue = node.type === 'random' ? 100 : Number.POSITIVE_INFINITY;
            const rawVal = inputValue != null && inputValue !== '' ? Number(inputValue) : (node.value ?? fallback);
            runtimeNode.Value = Math.min(maxValue, Math.max(0, Number.isNaN(rawVal) ? fallback : rawVal));
        }
        if (node.type === 'building-status' || node.type === 'building-signal') {
            runtimeNode.SelectedBuildingInstanceId = Number(node.buildingInstanceId || 0);
        }
        if (node.type === 'sequence') {
            const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
            const rawValues = values.slice().map(v => Math.min(15, Math.max(0, Math.floor(Number(v || 0)))));
            runtimeNode.Values = rawValues.length > 0 ? rawValues : [0, 0, 0, 0];
        }
        if (node.type === 'hysteresis') {
            runtimeNode.Upper = Math.max(0, Number(node.upper ?? 500));
            runtimeNode.Lower = Math.max(0, Number(node.lower ?? 200));
        }
        if (node.type === 'pulse-shaper') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="minHoldSeconds"]')?.value;
            runtimeNode.IntervalSeconds = Math.max(0.1, Number(inputValue || node.minHoldSeconds || 1));
        }
        if (node.type === 'map-range') {
            const el = document.getElementById(id);
            runtimeNode.InMin = Number(el?.querySelector('.num-input[data-field="inMin"]')?.value || node.inMin || 0);
            runtimeNode.InMax = Number(el?.querySelector('.num-input[data-field="inMax"]')?.value || node.inMax || 100);
            runtimeNode.OutMin = Number(el?.querySelector('.num-input[data-field="outMin"]')?.value || node.outMin || 0);
            runtimeNode.OutMax = Number(el?.querySelector('.num-input[data-field="outMax"]')?.value || node.outMax || 100);
        }
        nodes.push(runtimeNode);
    });
    ensureSystemNodes(nodes);
    const latestConnectionByInput = new Map();
    connections.forEach(conn => {
        if (nodesData[conn.toNode]?.type === 'reroute') return;
        const source = resolveRuntimeSource(conn.fromNode, conn.fromPort);
        if (!source) return;
        const toNodeId = normalizeNodeId(conn.toNode, nodesData[conn.toNode]?.type);
        const toPortIndex = parsePortIndex(conn.toPort);
        latestConnectionByInput.set(`${toNodeId}:${toPortIndex}`, {
            FromNodeId: normalizeNodeId(source.nodeId, nodesData[source.nodeId]?.type),
            FromPortIndex: parsePortIndex(source.port),
            ToNodeId: toNodeId,
            ToPortIndex: toPortIndex
        });
    });
    const runtimeConnections = Array.from(latestConnectionByInput.values());
    return JSON.stringify({ Nodes: nodes, Connections: runtimeConnections });
}

function ensureSystemNodes(nodes) {
    const required = [
        { Id: 'system:material', Module: 'MaterialCondition' },
        { Id: 'system:compare', Module: 'Variable' },
        { Id: 'system:output', Module: 'Output' }
    ];
    required.forEach(item => {
        if (!nodes.some(node => node.Id === item.Id)) nodes.push(item);
    });
}

function normalizeNodeId(id, type) {
    if (id === 'node_mat' || type === 'material') return 'system:material';
    if (id === 'node_out' || type === 'output') return 'system:output';
    return id;
}

function parsePortIndex(port) {
    const parts = String(port || '0').split('-');
    return Number(parts[1] || 0);
}

function currentThreshold() {
    const constant = Object.keys(nodesData).find(id => nodesData[id].type === 'constant');
    const value = constant ? document.getElementById(constant)?.querySelector('.num-input')?.value : '';
    return Math.max(0, Number(value || serverState.conditionThresholdKg || serverState.ConditionThresholdKg || 100));
}

            ? stripGameRichText(serverState.buildingName || serverState.BuildingName || 'logic-diy')
            : (serverState.buildingName || serverState.BuildingName || 'logic-diy'))
            .replace(/[\\/:*?"<>|]+/g, '_').trim() || 'logic-diy';
        a.download = `${name}.json`;
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
    });

    importBlueprintFile.addEventListener('change', () => {
        const file = importBlueprintFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const blueprint = JSON.parse(reader.result);
                if (!blueprint.nodesData || !blueprint.connections) {
                    alert('Invalid blueprint file');
                    return;
                }
                if (!confirm('Importing will replace the current graph. Continue?')) return;
                const ok = loadLayoutState({
                    version: blueprint.version,
                    nodesData: blueprint.nodesData,
                    connections: blueprint.connections,
                    nodeIdCounter: blueprint.nodeIdCounter || 0,
                    connectionIdCounter: blueprint.connectionIdCounter || 0,
                    canvasZoom: blueprint.canvasZoom || 1,
                    canvasPanX: blueprint.canvasPanX || 0,
                    canvasPanY: blueprint.canvasPanY || 0
                }, true);
                if (ok) { setStatus('Imported'); markCircuitDirty(); }
            } catch(e) { alert('Failed to parse blueprint file: ' + e.message); }
        };
        reader.readAsText(file);
        importBlueprintFile.value = '';
    });
}

function alignSelectedReroutesHorizontally() {
    const selectedReroutes = new Set([...selectedNodeIds].filter(id => nodesData[id]?.type === 'reroute'));
    const selectedModules = [...selectedNodeIds].filter(id => nodesData[id] && !['reroute', 'group'].includes(nodesData[id].type));
    let changed = false;
    if (selectedModules.length >= 2) {
        const moduleSizes = new Map(selectedModules.map(id => {
            const el = document.getElementById(id);
            const fallback = getNodeVisualSize(nodesData[id].type, id);
            return [id, { width: el?.offsetWidth || fallback.width, height: el?.offsetHeight || fallback.height }];
        }));
        const targetCenterY = selectedModules.reduce((sum, id) => sum + Number(nodesData[id].y || 0) + moduleSizes.get(id).height * 0.5, 0) / selectedModules.length;
        selectedModules.forEach(id => {
            const size = moduleSizes.get(id);
            const nextY = clampToWorkspace(nodesData[id].x, targetCenterY - size.height * 0.5, size.width, size.height).y;
            if (Math.abs(nodesData[id].y - nextY) > 0.01) changed = true;
            nodesData[id].y = nextY;
            const el = document.getElementById(id);
            if (el) el.style.top = `${nextY}px`;
        });
    }
    if (!selectedReroutes.size) {
        if (changed) { renderConnections(); markDirty(); }
        return changed;
    }
    const adjacency = new Map([...selectedReroutes].map(id => [id, new Set()]));
    connections.forEach(link => {
        if (!selectedReroutes.has(link.fromNode) || !selectedReroutes.has(link.toNode)) return;
        adjacency.get(link.fromNode).add(link.toNode);
        adjacency.get(link.toNode).add(link.fromNode);
    });
    const visited = new Set();
    selectedReroutes.forEach(startId => {
        if (visited.has(startId)) return;
        const component = [];
        const queue = [startId];
        visited.add(startId);
        while (queue.length) {
            const id = queue.shift();
            component.push(id);
            adjacency.get(id).forEach(nextId => {
                if (visited.has(nextId)) return;
                visited.add(nextId);
                queue.push(nextId);
            });
        }
        if (component.length < 2) return;
        const targetY = component.reduce((sum, id) => sum + Number(nodesData[id].y || 0), 0) / component.length;
        component.forEach(id => {
            if (Math.abs(nodesData[id].y - targetY) > 0.01) changed = true;
            nodesData[id].y = targetY;
        });
    });
    if (!changed) return false;
    renderConnections();
    markDirty();
    return true;
}

function alignSelectedItemsToEdge(edge) {
    const ids = [...selectedNodeIds].filter(id => nodesData[id] && nodesData[id].type !== 'group');
    if (ids.length < 2) return false;
    const items = ids.map(id => {
        const node = nodesData[id];
        if (node.type === 'reroute') {
            return { id, node, width: 0, height: 0, left: node.x, right: node.x, top: node.y, bottom: node.y };
        }
        const bounds = getNodeBounds(id);
        return { id, node, width: bounds.right - bounds.left, height: bounds.bottom - bounds.top, ...bounds };
    });
    const target = edge === 'top' ? Math.min(...items.map(item => item.top))
        : edge === 'left' ? Math.min(...items.map(item => item.left))
        : edge === 'right' ? Math.max(...items.map(item => item.right))
        : Math.max(...items.map(item => item.bottom));
    let changed = false;
    items.forEach(item => {
        let nextX = item.node.x;
        let nextY = item.node.y;
        if (edge === 'top') nextY = target;
        else if (edge === 'bottom') nextY = target - item.height;
        else if (edge === 'left') nextX = target;
        else if (edge === 'right') nextX = target - item.width;
        if (item.node.type === 'reroute') {
            nextX = Math.max(0, Math.min(WORKSPACE_WIDTH, nextX));
            nextY = Math.max(0, Math.min(WORKSPACE_HEIGHT, nextY));
        } else {
            const clamped = clampToWorkspace(nextX, nextY, item.width, item.height);
            nextX = clamped.x;
            nextY = clamped.y;
        }
        if (Math.abs(item.node.x - nextX) > 0.01 || Math.abs(item.node.y - nextY) > 0.01) changed = true;
        item.node.x = nextX;
        item.node.y = nextY;
        const el = document.getElementById(item.id);
        if (!el) return;
        if (item.node.type === 'reroute') el.setAttribute('transform', `translate(${nextX} ${nextY})`);
        else { el.style.left = `${nextX}px`; el.style.top = `${nextY}px`; }
    });
    if (!changed) return false;
    refreshGraphLinkGeometry();
    markDirty();
    return true;
}
