const nodeDocByType = Object.fromEntries(docGroups.flatMap(group =>
    group.items.map(item => [item[0], { description: item[1], example: item[2] }])
));

function markDirty() {
    statusEl.textContent = t('unsaved');
    persistLayout();
    scheduleAutoSave();
}

function setStatus(text) {
    statusEl.textContent = text;
}

function setEditorTitle(name) {
    const cleanName = stripGameRichText(name || '').trim();
    const title = cleanName ? `${cleanName} - ${t('editorTitle')}` : t('editorTitle');
    document.title = `${title} [SNLD-${editorId}]`;
    editorTitleEl.textContent = title;
}

function toggleDocsPage(forceVisible) {
    const visible = typeof forceVisible === 'boolean' ? forceVisible : !docsPage.classList.contains('visible');
    docsPage.classList.toggle('visible', visible);
    docsBtn.classList.toggle('active', visible);
    docsBtn.textContent = visible ? t('backToEdit') : t('docs');
    if (visible) {
        renderDocsPage(0);
        materialPicker.classList.remove('visible');
    }
}

function renderDocsPage(activeIndex) {
    const groups = getDocGroups();
    docsNav.innerHTML = `<div class="docs-title">${escapeHtml(t('docsTitle'))}</div>`;
    groups.forEach((group, index) => {
        const button = document.createElement('button');
        button.textContent = group.title;
        button.className = index === activeIndex ? 'active' : '';
        button.addEventListener('click', () => renderDocsPage(index));
        docsNav.appendChild(button);
    });

    const group = groups[activeIndex] || groups[0];
    docsContent.innerHTML = `<h2>${escapeHtml(group.title)}</h2><div class="docs-grid"></div>`;
    const grid = docsContent.querySelector('.docs-grid');
    group.items.forEach(item => grid.appendChild(createDocsCard(item[0])));
}

function createDocsCard(type) {
    const meta = nodeMeta[type] || {};
    const text = getNodeText(type);
    const doc = { description: text[1] || '', example: currentLanguage === 'en' ? 'Connect this node with ports in the graph.' : '把这个节点接入图中的端点。' };
    const card = document.createElement('div');
    card.className = 'docs-card';
    card.innerHTML = `
        <h3>${escapeHtml(meta.title || type)}</h3>
        <div class="docs-meta">
            <span>${t('input')} ${Number(meta.inputs || 0)}</span>
            <span>${t('output')} ${Number(meta.outputs || 0)}</span>
            <span>${escapeHtml(getNodeOutputUnit(type))}</span>
        </div>
        <p>${escapeHtml(doc.description || t('noDescription'))}</p>
        <div class="docs-example">${escapeHtml(doc.example || '')}</div>
    `;
    return card;
}

function getNodeOutputUnit(type) {
    if (type.startsWith('inventory-') && type !== 'inventory-percent') return t('unitKg');
    if (type.startsWith('power-') && type !== 'power-percent') return t('unitJ');
    if (type.endsWith('percent')) return t('percentRange');
    if (type === 'material' || type === 'material-low' || type === 'material-high') return t('materialKg');
    if (type === 'test-signal' || type === 'group' || type === 'output') return t('noOutput');
    return t('truthy');
}

function handleGameDisconnected() {
    setStatus(t('gameClosed'));
    clearInterval(heartbeatTimer);
    clearTimeout(stateRefreshTimer);
    clearTimeout(signalStateRefreshTimer);
    clearTimeout(monitorPreviewTimer);
    document.body.classList.add('disconnected');
    setTimeout(() => {
        window.open('', '_self');
        window.close();
    }, 300);
    setTimeout(() => window.close(), 1200);
}

function scheduleAutoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveToGame(t('autoSaving'), t('autoSaved')), 700);
}

function localizePage(refreshNodes) {
    currentLanguage = currentLanguage === 'en' ? 'en' : 'zh';
    localStorage.setItem(LANG_STORAGE_KEY, currentLanguage);
    hideNodeMenu();
    applyNodeTranslations();
    renderSidebar();
    docsBtn.textContent = docsPage.classList.contains('visible') ? t('backToEdit') : t('docs');
    saveBtn.textContent = t('save');
    exportPngBtn.textContent = t('exportPng');
    langBtn.textContent = currentLanguage === 'zh' ? 'EN' : '中文';
    applySidebarCollapsedState();
    if (!statusEl.textContent || ['未保存', 'Unsaved'].includes(statusEl.textContent)) {
        statusEl.textContent = t('unsaved');
    }
    document.querySelector('.canvas-hint').textContent = t('canvasHint');
    fitViewBtn.textContent = t('fitView');
    document.querySelector('.shutdown-message').textContent = t('shutdown');
    setEditorTitle(serverState.buildingName || serverState.BuildingName || '');
    if (refreshNodes) {
        document.querySelectorAll('.node').forEach(node => node.remove());
        Object.entries(nodesData).forEach(([id, node]) => {
            const el = createNodeDOM(id, node.type, node.x, node.y);
            if (el) nodeLayer.appendChild(el);
        });
        clearSelection();
        renderConnections();
        updateSignalMonitors();
    }
    if (docsPage.classList.contains('visible')) renderDocsPage(0);
}

function getCanvasPoint(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left - canvasPanX) / canvasZoom,
        y: (e.clientY - rect.top - canvasPanY) / canvasZoom
    };
}

function getCanvasScreenPoint(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function setCanvasZoom(nextZoom) {
    canvasZoom = Math.min(2.2, Math.max(0.45, Number(nextZoom) || 1));
    canvas.style.setProperty('--canvas-zoom', canvasZoom);
    zoomBadge.textContent = `${Math.round(canvasZoom * 100)}%`;
    renderConnections();
    persistLayout();
}

function setCanvasPan(x, y) {
    canvasPanX = Number(x) || 0;
    canvasPanY = Number(y) || 0;
    canvas.style.setProperty('--canvas-pan-x', `${canvasPanX}px`);
    canvas.style.setProperty('--canvas-pan-y', `${canvasPanY}px`);
    renderConnections();
    persistLayout();
}

function clearSelection() {
    selectedNodeIds.forEach(id => document.getElementById(id)?.classList.remove('selected'));
    selectedNodeIds.clear();
}

function selectNode(id, selected) {
    if (!nodesData[id]) return;
    if (selected) {
        selectedNodeIds.add(id);
        document.getElementById(id)?.classList.add('selected');
    } else {
        selectedNodeIds.delete(id);
        document.getElementById(id)?.classList.remove('selected');
    }
}

function deleteSelectedNodes() {
    const ids = Array.from(selectedNodeIds);
    if (!ids.length) return;
    ids.forEach(id => document.getElementById(id)?.remove());
    const selected = new Set(ids);
    connections = connections.filter(conn => !selected.has(conn.fromNode) && !selected.has(conn.toNode));
    ids.forEach(id => delete nodesData[id]);
    clearSelection();
    renderConnections();
    updateSignalMonitors();
    markDirty();
}

function copySelectedNodes() {
    const ids = Array.from(selectedNodeIds);
    if (!ids.length) return;
    const selected = new Set(ids);
    internalClipboard = {
        nodes: ids.map(id => ({ oldId: id, data: structuredCloneSafe(nodesData[id]) })),
        connections: connections
            .filter(conn => selected.has(conn.fromNode) && selected.has(conn.toNode))
            .map(conn => structuredCloneSafe(conn))
    };
}

function pasteCopiedNodes() {
    if (!internalClipboard?.nodes?.length) return;
    clearSelection();
    const idMap = {};
    const firstNode = internalClipboard.nodes[0].data || {};
    const offsetX = (lastMouseCanvasPoint?.x ?? 120) - Number(firstNode.x || 0);
    const offsetY = (lastMouseCanvasPoint?.y ?? 120) - Number(firstNode.y || 0);
    internalClipboard.nodes.forEach((item, idx) => {
        const oldId = item.oldId;
        const oldData = item.data || {};
        const newId = `node_${++nodeIdCounter}`;
        idMap[oldId] = newId;
        const step = (idx + 1) * 26;
        nodesData[newId] = {
            ...structuredCloneSafe(oldData),
            x: Number(oldData.x || 0) + offsetX + step,
            y: Number(oldData.y || 0) + offsetY + step
        };
        const el = createNodeDOM(newId, nodesData[newId].type, nodesData[newId].x, nodesData[newId].y);
        if (el) nodeLayer.appendChild(el);
        selectNode(newId, true);
    });
    internalClipboard.connections.forEach(conn => {
        if (!idMap[conn.fromNode] || !idMap[conn.toNode]) return;
        connections.push({
            id: `conn_${++connectionIdCounter}`,
            fromNode: idMap[conn.fromNode],
            fromPort: conn.fromPort,
            toNode: idMap[conn.toNode],
            toPort: conn.toPort
        });
    });
    renderConnections();
    updateSignalMonitors();
    markDirty();
}

function structuredCloneSafe(value) {
    return JSON.parse(JSON.stringify(value || {}));
}

function updateSelectionBox(currentPoint) {
    const x1 = Math.min(selectionStart.x, currentPoint.x);
    const y1 = Math.min(selectionStart.y, currentPoint.y);
    const x2 = Math.max(selectionStart.x, currentPoint.x);
    const y2 = Math.max(selectionStart.y, currentPoint.y);
    selectionBox.style.left = `${x1}px`;
    selectionBox.style.top = `${y1}px`;
    selectionBox.style.width = `${x2 - x1}px`;
    selectionBox.style.height = `${y2 - y1}px`;
}

function finishBoxSelection(e) {
    if (!isBoxSelecting || !selectionStart) return;
    const end = getCanvasScreenPoint(e);
    const x1 = Math.min(selectionStart.x, end.x);
    const y1 = Math.min(selectionStart.y, end.y);
    const x2 = Math.max(selectionStart.x, end.x);
    const y2 = Math.max(selectionStart.y, end.y);
    const cr = canvas.getBoundingClientRect();
    const sx = selectionStart.x + cr.left, sy = selectionStart.y + cr.top;
    const insideGroup = [...document.querySelectorAll('.group-node')].some(g => {
        const r = g.getBoundingClientRect();
        return sx >= r.left && sx <= r.right && sy >= r.top && sy <= r.bottom;
    });
    if (!e.shiftKey) clearSelection();
    document.querySelectorAll(insideGroup ? '.node:not(.group-node)' : '.node').forEach(node => {
        const rect = node.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        const nodeRect = {
            left: rect.left - canvasRect.left,
            top: rect.top - canvasRect.top,
            right: rect.right - canvasRect.left,
            bottom: rect.bottom - canvasRect.top
        };
        const intersects = nodeRect.left <= x2 && nodeRect.right >= x1 && nodeRect.top <= y2 && nodeRect.bottom >= y1;
        if (intersects) selectNode(node.id, true);
    });
    selectionBox.style.display = 'none';
    isBoxSelecting = false;
    selectionStart = null;
}

function beginNodeDrag(e, id) {
    if (!nodesData[id]) return;
    if (!selectedNodeIds.has(id)) {
        if (!e.shiftKey) clearSelection();
        selectNode(id, true);
    }

    dragNodeId = id;
    dragSelectedNodes = selectedNodeIds.has(id) ? Array.from(selectedNodeIds) : [id];
    if (nodesData[id]?.type === 'group') {
        getNodesInsideGroup(id).forEach(nodeId => {
            if (!dragSelectedNodes.includes(nodeId)) dragSelectedNodes.push(nodeId);
        });
    }

    const mouse = getCanvasPoint(e);
    dragStartMouse = { x: e.clientX, y: e.clientY };
    dragStartPositions = {};
    dragSelectedNodes.forEach(nodeId => {
        dragStartPositions[nodeId] = {
            x: nodesData[nodeId]?.x || 0,
            y: nodesData[nodeId]?.y || 0
        };
    });
    document.querySelectorAll('.node').forEach(n => {
        n.style.zIndex = n.classList.contains('group-node') ? 4 : 10;
    });
    dragSelectedNodes.forEach(nodeId => {
        const selectedEl = document.getElementById(nodeId);
        if (selectedEl) selectedEl.style.zIndex = selectedEl.classList.contains('group-node') ? 4 : 11;
    });
    dragOffsetX = mouse.x - (nodesData[id]?.x || 0);
    dragOffsetY = mouse.y - (nodesData[id]?.y || 0);
}

function getGroupSize(id) {
    return {
        width: Math.max(160, Number(nodesData[id]?.width || 280)),
        height: Math.max(110, Number(nodesData[id]?.height || 180))
    };
}

function getNodesInsideGroup(groupId) {
    const group = nodesData[groupId];
    if (!group) return [];
    const size = getGroupSize(groupId);
    const bounds = {
        left: group.x,
        top: group.y,
        right: group.x + size.width,
        bottom: group.y + size.height
    };
    return Object.keys(nodesData).filter(id => {
        if (id === groupId || nodesData[id]?.type === 'group') return false;
        const rect = getNodeBounds(id);
        return rect.left >= bounds.left && rect.right <= bounds.right && rect.top >= bounds.top && rect.bottom <= bounds.bottom;
    });
}

function getNodeBounds(id) {
    const data = nodesData[id] || {};
    const el = document.getElementById(id);
    const width = data.type === 'group' ? getGroupSize(id).width : (el?.offsetWidth || 160);
    const height = data.type === 'group' ? getGroupSize(id).height : (el?.offsetHeight || 100);
    return {
        left: Number(data.x || 0),
        top: Number(data.y || 0),
        right: Number(data.x || 0) + width,
        bottom: Number(data.y || 0) + height
    };
}

function clampToWorkspace(x, y, width = 160, height = 100) {
    return {
        x: Math.min(Math.max(0, Number(x) || 0), Math.max(0, WORKSPACE_WIDTH - width)),
        y: Math.min(Math.max(0, Number(y) || 0), Math.max(0, WORKSPACE_HEIGHT - height))
    };
}

function getAllNodesBounds() {
    const boundsList = Object.keys(nodesData)
        .filter(id => document.getElementById(id))
        .map(id => getNodeBounds(id));
    if (!boundsList.length) return null;
    return boundsList.reduce((acc, bounds) => ({
        left: Math.min(acc.left, bounds.left),
        top: Math.min(acc.top, bounds.top),
        right: Math.max(acc.right, bounds.right),
        bottom: Math.max(acc.bottom, bounds.bottom)
    }), boundsList[0]);
}

function fitAllNodesToView() {
    const bounds = getAllNodesBounds() || { left: 0, top: 0, right: WORKSPACE_WIDTH, bottom: WORKSPACE_HEIGHT };

    const rect = canvas.getBoundingClientRect();
    const padding = 90;
    const availableWidth = Math.max(100, rect.width - padding * 2);
    const availableHeight = Math.max(100, rect.height - padding * 2);
    const contentWidth = Math.max(1, bounds.right - bounds.left);
    const contentHeight = Math.max(1, bounds.bottom - bounds.top);
    const fitZoom = Math.min(
        1,
        Math.max(0.45, Math.min(
            availableWidth / contentWidth,
            availableHeight / contentHeight
        ))
    );
    const panX = (rect.width - contentWidth * fitZoom) * 0.5 - bounds.left * fitZoom;
    const panY = (rect.height - contentHeight * fitZoom) * 0.5 - bounds.top * fitZoom;
    setCanvasZoom(fitZoom);
    setCanvasPan(panX, panY);
}

function beginGroupResize(e, id, direction) {
    resizeGroupId = id;
    resizeDirection = direction;
    resizeStartPoint = getCanvasPoint(e);
    resizeStartBox = {
        x: nodesData[id]?.x || 0,
        y: nodesData[id]?.y || 0,
        ...getGroupSize(id)
    };
}

function applyGroupResize(e) {
    if (!resizeGroupId || !resizeStartPoint || !resizeStartBox) return;
    const point = getCanvasPoint(e);
    const dx = point.x - resizeStartPoint.x;
    const dy = point.y - resizeStartPoint.y;
    let nextX = resizeStartBox.x;
    let nextY = resizeStartBox.y;
    let nextWidth = resizeStartBox.width;
    let nextHeight = resizeStartBox.height;
    if (resizeDirection.includes('e')) nextWidth = resizeStartBox.width + dx;
    if (resizeDirection.includes('s')) nextHeight = resizeStartBox.height + dy;
    if (resizeDirection.includes('w')) {
        nextX = resizeStartBox.x + dx;
        nextWidth = resizeStartBox.width - dx;
    }
    if (resizeDirection.includes('n')) {
        nextY = resizeStartBox.y + dy;
        nextHeight = resizeStartBox.height - dy;
    }
    nextWidth = Math.max(160, nextWidth);
    nextHeight = Math.max(110, nextHeight);
    if (resizeDirection.includes('w')) nextX = resizeStartBox.x + resizeStartBox.width - nextWidth;
    if (resizeDirection.includes('n')) nextY = resizeStartBox.y + resizeStartBox.height - nextHeight;
    if (nextX < 0) {
        nextWidth += nextX;
        nextX = 0;
    }
    if (nextY < 0) {
        nextHeight += nextY;
        nextY = 0;
    }
    nextWidth = Math.min(Math.max(160, nextWidth), WORKSPACE_WIDTH - nextX);
    nextHeight = Math.min(Math.max(110, nextHeight), WORKSPACE_HEIGHT - nextY);
    nodesData[resizeGroupId].x = nextX;
    nodesData[resizeGroupId].y = nextY;
    nodesData[resizeGroupId].width = nextWidth;
    nodesData[resizeGroupId].height = nextHeight;
    const el = document.getElementById(resizeGroupId);
    if (el) {
        el.style.left = `${nodesData[resizeGroupId].x}px`;
        el.style.top = `${nodesData[resizeGroupId].y}px`;
        applyGroupSize(el, resizeGroupId);
    }
    persistLayout();
}

function endGroupResize() {
    if (!resizeGroupId) return;
    resizeGroupId = null;
    resizeDirection = '';
    resizeStartPoint = null;
    resizeStartBox = null;
    markDirty();
}


function toBin4(n) {
    const v = Math.max(0, Math.min(15, Math.floor(Number(n || 0))));
    return v.toString(2).padStart(4, '0');
}

function formatTons(kg) {
    const amount = Math.max(0, Number(kg || 0));
    if (amount < 1000) {
        if (amount > 0 && amount < 0.1) return '<0.1kg';
        const digits = amount < 10 ? 1 : 0;
        return `${amount.toFixed(digits)}kg`;
    }
    return `${(amount / 1000).toFixed(1)}${t('ton')}`;
}

canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
    e.preventDefault();
    if (!draggedType) return;
    const point = getCanvasPoint(e);
    createNodeAt(draggedType, point.x - 50, point.y - 20);

});

canvas.addEventListener('wheel', e => {
    if (docsPage.classList.contains('visible') || e.target.closest('.material-picker') || e.target.closest('.node-menu')) return;
    e.preventDefault();
    const direction = e.deltaY > 0 ? -1 : 1;
    const oldZoom = canvasZoom;
    const newZoom = Math.min(2.2, Math.max(0.45, oldZoom + direction * 0.08));
    if (oldZoom === newZoom) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    canvasPanX = mx - ((mx - canvasPanX) / oldZoom) * newZoom;
    canvasPanY = my - ((my - canvasPanY) / oldZoom) * newZoom;
    canvasZoom = newZoom;
    canvas.style.setProperty('--canvas-zoom', canvasZoom);
    canvas.style.setProperty('--canvas-pan-x', `${canvasPanX}px`);
    canvas.style.setProperty('--canvas-pan-y', `${canvasPanY}px`);
    zoomBadge.textContent = `${Math.round(canvasZoom * 100)}%`;
    renderConnections();
    persistLayout();
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
});

canvas.addEventListener('mousedown', e => {
    if (document.activeElement && (document.activeElement.contentEditable === 'true' || document.activeElement.tagName === 'INPUT')) document.activeElement.blur();
    if (e.button === 2 && !docsPage.classList.contains('visible') && !e.target.closest('.node') && !e.target.closest('.port') && !e.target.closest('.material-picker') && !e.target.closest('.node-menu')) {
        isPanningCanvas = true;
        panStartPoint = { x: e.clientX, y: e.clientY };
        rightMouseDownPoint = { x: e.clientX, y: e.clientY };
        rightMouseCanvasPoint = getCanvasPoint(e);
        rightPanMoved = false;
        panStartOffset = { x: canvasPanX, y: canvasPanY };
        canvas.classList.add('panning');
        materialPicker.classList.remove('visible');
        hideNodeMenu();
        e.preventDefault();
        return;
    }
    if (e.button !== 0 || e.target.tagName === 'path' || e.target.closest('.node') || e.target.closest('.port') || e.target.closest('.material-picker') || e.target.closest('.node-menu')) return;
    if (!e.shiftKey) clearSelection();
    isBoxSelecting = true;
    selectionStart = getCanvasScreenPoint(e);
    selectionBox.style.display = 'block';
    updateSelectionBox(selectionStart);
    materialPicker.classList.remove('visible');
    e.preventDefault();
});

document.addEventListener('mousemove', e => {
    lastMouseCanvasPoint = getCanvasPoint(e);
    if (isPanningCanvas && panStartPoint && panStartOffset) {
        if (rightMouseDownPoint && Math.hypot(e.clientX - rightMouseDownPoint.x, e.clientY - rightMouseDownPoint.y) > 5) {
            rightPanMoved = true;
        }
        setCanvasPan(
            panStartOffset.x + e.clientX - panStartPoint.x,
            panStartOffset.y + e.clientY - panStartPoint.y
        );
        return;
    }
    if (resizeGroupId) {
        applyGroupResize(e);
        return;
    }
    if (dragNodeId && dragStartMouse) {
        let dx = (e.clientX - dragStartMouse.x) / canvasZoom;
        let dy = (e.clientY - dragStartMouse.y) / canvasZoom;
        dragSelectedNodes.forEach(nodeId => {
            const startPos = dragStartPositions[nodeId];
            const nodeEl = document.getElementById(nodeId);
            if (!startPos || !nodeEl || !nodesData[nodeId]) return;
            const width = nodesData[nodeId].type === 'group' ? getGroupSize(nodeId).width : (nodeEl.offsetWidth || 160);
            const height = nodesData[nodeId].type === 'group' ? getGroupSize(nodeId).height : (nodeEl.offsetHeight || 100);
            dx = Math.min(dx, WORKSPACE_WIDTH - width - startPos.x);
            dy = Math.min(dy, WORKSPACE_HEIGHT - height - startPos.y);
            dx = Math.max(dx, -startPos.x);
            dy = Math.max(dy, -startPos.y);
        });
        dragSelectedNodes.forEach(nodeId => {
            const startPos = dragStartPositions[nodeId];
            const nodeEl = document.getElementById(nodeId);
            if (!startPos || !nodeEl || !nodesData[nodeId]) return;
            const x = startPos.x + dx;
            const y = startPos.y + dy;
            nodeEl.style.left = `${x}px`;
            nodeEl.style.top = `${y}px`;
            nodesData[nodeId].x = x;
            nodesData[nodeId].y = y;
        });
        renderConnections();
        persistLayout();
    }
    if (activeDrawingLine && sourcePortEl) {
        const p1 = calculatePortAbsolutePos(sourcePortEl);
        const point = getCanvasPoint(e);
        const mouseX = point.x;
        const mouseY = point.y;
        const snapTarget = findSnapPort(mouseX, mouseY);
        setSnappedPort(snapTarget);
        const p2 = snapTarget ? calculatePortAbsolutePos(snapTarget) : { x: mouseX, y: mouseY };
        const deltaX = Math.abs(p2.x - p1.x) * 0.5;
        activeDrawingLine.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x + deltaX} ${p1.y}, ${p2.x - deltaX} ${p2.y}, ${p2.x} ${p2.y}`);
    }
    if (isBoxSelecting && selectionStart) {
        updateSelectionBox(getCanvasScreenPoint(e));
    }
});

document.addEventListener('mousedown', e => {
    if (!materialPicker.contains(e.target) && !e.target.closest('.material-content') && !e.target.closest('.building-content')) {
        materialPicker.classList.remove('visible');
    }
    if (!nodeMenu.contains(e.target)) {
        hideNodeMenu();
    }
});

document.addEventListener('mouseup', e => {
    if (isPanningCanvas) {
        const shouldOpenNodeMenu = e.button === 2 && !rightPanMoved && rightMouseDownPoint && !e.target.closest('.node') && !e.target.closest('.port') && !e.target.closest('.material-picker') && !e.target.closest('.node-menu');
        const screenPoint = rightMouseDownPoint
            ? getCanvasScreenPoint({ clientX: rightMouseDownPoint.x, clientY: rightMouseDownPoint.y })
            : getCanvasScreenPoint(e);
        const canvasPoint = rightMouseCanvasPoint || getCanvasPoint(e);
        const restorePan = panStartOffset ? { ...panStartOffset } : { x: canvasPanX, y: canvasPanY };
        isPanningCanvas = false;
        panStartPoint = null;
        panStartOffset = null;
        canvas.classList.remove('panning');
        if (rightPanMoved) {
            persistLayout();
        } else {
            setCanvasPan(restorePan.x, restorePan.y);
        }
        rightMouseDownPoint = null;
        rightMouseCanvasPoint = null;
        rightPanMoved = false;
        if (shouldOpenNodeMenu) {
            showNodeMenu(screenPoint, canvasPoint);
        }
        return;
    }
    if (resizeGroupId) {
        endGroupResize();
        return;
    }
    if (isBoxSelecting) {
        finishBoxSelection(e);
        return;
    }
    dragNodeId = null;
    dragSelectedNodes = [];
    dragStartPositions = {};
    dragStartMouse = null;
    if (!activeDrawingLine) return;
    const point = getCanvasPoint(e);
    const mouseX = point.x;
    const mouseY = point.y;
    const targetPortEl = snappedPortEl || e.target.closest('.port') || findSnapPort(mouseX, mouseY);
    if (targetPortEl && targetPortEl !== sourcePortEl) {
        connectPorts(sourcePortEl, targetPortEl);
    }
    activeDrawingLine.remove();
    activeDrawingLine = null;
    setSnappedPort(null);
    sourcePortEl = null;
    renderConnections();
});

// ===== Connection Drawing (SVG lines between ports) =====
function connectPorts(a, b) {
    const from = a.classList.contains('output') ? a : b;
    const to = a.classList.contains('input') ? a : b;
    if (!from.classList.contains('output') || !to.classList.contains('input')) return;
    if (from.parentElement.id === to.parentElement.id) return;
    connections = connections.filter(conn => !(conn.toNode === to.parentElement.id && conn.toPort === to.dataset.port));
    connections.push({
        id: `conn_${++connectionIdCounter}`,
        fromNode: from.parentElement.id,
        fromPort: from.dataset.port,
        toNode: to.parentElement.id,
        toPort: to.dataset.port
    });
    if (isWideMathType(nodesData[to.parentElement.id]?.type)) refreshNodeDOM(to.parentElement.id);
    updateSignalMonitors();
    markDirty();
}

function calculatePortAbsolutePos(portEl) {
    const portRect = portEl.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    return {
        x: (portRect.left + portRect.width * 0.5 - canvasRect.left - canvasPanX) / canvasZoom,
        y: (portRect.top + portRect.height * 0.5 - canvasRect.top - canvasPanY) / canvasZoom
    };
}

function setSnappedPort(portEl) {
    if (snappedPortEl === portEl) return;
    snappedPortEl?.classList.remove('snap-target');
    snappedPortEl = portEl;
    snappedPortEl?.classList.add('snap-target');
}

function findSnapPort(mouseX, mouseY) {
    if (!sourcePortEl) return null;
    const wantsInput = sourcePortEl.classList.contains('output');
    const selector = wantsInput ? '.port.input' : '.port.output';
    let bestPort = null;
    let bestDistance = SNAP_DISTANCE;
    document.querySelectorAll(selector).forEach(port => {
        if (port === sourcePortEl || port.parentElement === sourcePortEl.parentElement) return;
        const pos = calculatePortAbsolutePos(port);
        const distance = Math.hypot(pos.x - mouseX, pos.y - mouseY);
        if (distance < bestDistance) {
            bestDistance = distance;
            bestPort = port;
        }
    });
    return bestPort;
}

function renderConnections() {
    svgLayer.innerHTML = '';
    connections.forEach(conn => {
        const fromNodeEl = document.getElementById(conn.fromNode);
        const toNodeEl = document.getElementById(conn.toNode);
        if (!fromNodeEl || !toNodeEl) return;
        const fromPortEl = fromNodeEl.querySelector(`.port.output[data-port="${conn.fromPort}"]`);
        const toPortEl = toNodeEl.querySelector(`.port.input[data-port="${conn.toPort}"]`);
        if (!fromPortEl || !toPortEl) return;
        const p1 = calculatePortAbsolutePos(fromPortEl);
        const p2 = calculatePortAbsolutePos(toPortEl);
        const deltaX = Math.abs(p2.x - p1.x) * 0.5;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.id = `conn-path-${conn.id}`;
        path.setAttribute('d', `M ${p1.x} ${p1.y} C ${p1.x + deltaX} ${p1.y}, ${p2.x - deltaX} ${p2.y}, ${p2.x} ${p2.y}`);
        path.setAttribute('stroke', '#7a8274');
        path.setAttribute('stroke-width', '3');
        path.setAttribute('fill', 'none');
        path.addEventListener('click', () => {
            connections = connections.filter(c => c.id !== conn.id);
            if (isWideMathType(nodesData[conn.toNode]?.type)) refreshNodeDOM(conn.toNode);
            renderConnections();
            updateSignalMonitors();
            markDirty();
        });
        svgLayer.appendChild(path);
    });
    updateLiveSignals();
}

function getExportNodeSize(id) {
    const data = nodesData[id] || {};
    const meta = nodeMeta[data.type] || {};
    if (data.type === 'group') return getGroupSize(id);
    const el = document.getElementById(id);
    const fallback = getNodeVisualSize(data.type, id);
    return {
        width: el?.offsetWidth || fallback.width || 180,
        height: el?.offsetHeight || fallback.height || Number(meta.contentHeight || 80) + 44
    };
}

function getExportPortPosition(nodeId, direction, portName) {
    const data = nodesData[nodeId];
    const rawMeta = nodeMeta[data?.type || ''] || {};
    const meta = buildRenderMeta(data?.type || '', nodeId, rawMeta);
    const size = getExportNodeSize(nodeId);
    const index = parsePortIndex(portName);
    const count = direction === 'output' ? Number(meta.outputs || 0) : Number(meta.inputs || 0);
    const customCenters = direction === 'output' ? meta.outputPortCenters : meta.inputPortCenters;
    const titleHeight = meta.card?.layout === 'wide-math' ? 0 : 28;
    const centerY = Array.isArray(customCenters) && customCenters[index] != null
        ? Number(customCenters[index])
        : titleHeight + Number(meta.contentHeight || Math.max(1, size.height - 44)) * ((index + 0.5) / Math.max(1, count));
    return {
        x: Number(data?.x || 0) + (direction === 'output' ? size.width : 0),
        y: Number(data?.y || 0) + centerY
    };
}

function drawRoundedRect(ctx, x, y, width, height, radius) {
    const r = Math.min(radius, width * 0.5, height * 0.5);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 4) {
    const words = String(text || '').split(/\s+/);
    const hasSpaces = words.length > 1;
    const units = hasSpaces ? words : Array.from(String(text || ''));
    let line = '';
    let lines = [];
    units.forEach(unit => {
        const next = hasSpaces ? (line ? `${line} ${unit}` : unit) : `${line}${unit}`;
        if (ctx.measureText(next).width > maxWidth && line) {
            lines.push(line);
            line = unit;
        } else {
            line = next;
        }
    });
    if (line) lines.push(line);
    lines = lines.slice(0, maxLines);
    lines.forEach((lineText, index) => ctx.fillText(lineText, x, y + index * lineHeight));
    return y + lines.length * lineHeight;
}

function getNodeExportLines(id) {
    const data = nodesData[id] || {};
    const type = data.type || '';
    const el = document.getElementById(id);
    if (type === 'output') return ['Port0                 1', 'Port1                 2', 'Port2                 4', 'Port3                 8'];
    if (type === 'cycle4') {
        const interval = Math.max(0.2, Number(data.intervalSeconds || 5)).toFixed(1);
        return [`${interval}s`, 'Port0              1', 'Port1              2', 'Port2              3', 'Port3              4'];
    }
    if (type === 'material' || type === 'material-change' || type === 'material-low' || type === 'material-high') {
        const material = getSelectedMaterial();
        const name = stripGameRichText(material?.Name || material?.name || t('chooseMaterial'));
        const amount = formatTons(material?.MassKg ?? material?.massKg ?? serverState.selectedMaterialAmountKg ?? 0).replace(/<[^>]*>/g, '');
        if (type === 'material') return [name, `${t('current')} ${amount}`];
        return [name, `${t('current')} ${amount}`, `${Math.max(0, Number(data.value || 100)).toFixed(0)}kg`];
    }
    if (type === 'building-status' || type === 'building-signal') {
        const building = getSelectedBuilding(id);
        const name = stripGameRichText(building?.Name || building?.name || t('chooseBuilding'));
        const value = type === 'building-signal'
            ? (building ? `${t('signalValue')} ${getBuildingSignalValue(building)}` : t('noBuildingSelected'))
            : (building ? ((building.Operational ?? building.operational) ? t('currentAvailable') : t('currentUnavailable')) : t('noBuildingSelected'));
        return [name, value];
    }
    if (type === 'constant') return [`${Math.max(0, Number(data.value ?? serverState.conditionThresholdKg ?? serverState.ConditionThresholdKg ?? 100)).toFixed(0)}kg`];
    if (type === 'timer' || type === 'delay') return [`${Math.max(0.2, Number(data.intervalSeconds || 5)).toFixed(1)}s`];
    if (type === 'random') return [`${Math.max(0, Math.min(100, Number(data.value ?? 50))).toFixed(0)}%`];
    if (type === 'group') return [data.text || t('groupDefault')];
    if (type === 'test-signal') return [el?.querySelector('.signal-state')?.textContent || t('signalRed'), el?.querySelector('.signal-value')?.textContent || '0'];
    const meta = nodeMeta[type] || {};
    return [meta.label || t('logicOutput'), meta.sign || ''];
}

function drawExportNode(ctx, id, bounds) {
    const data = nodesData[id];
    if (!data) return;
    const meta = buildRenderMeta(data.type, id, nodeMeta[data.type] || {});
    const size = getExportNodeSize(id);
    const x = Number(data.x || 0) - bounds.left;
    const y = Number(data.y || 0) - bounds.top;
    const isGroup = data.type === 'group';
    ctx.save();
    if (isGroup) {
        ctx.globalAlpha = 0.72;
        ctx.fillStyle = '#b6bbaa';
        ctx.strokeStyle = '#4a5046';
        ctx.lineWidth = 2;
        drawRoundedRect(ctx, x, y, size.width, size.height, 6);
        ctx.fill();
        ctx.stroke();
        ctx.globalAlpha = 1;
    } else {
        ctx.shadowColor = 'rgba(0,0,0,0.28)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillStyle = '#9fa599';
        ctx.strokeStyle = '#4a5046';
        ctx.lineWidth = 2;
        drawRoundedRect(ctx, x, y, size.width, size.height, 5);
        ctx.fill();
        ctx.stroke();
        ctx.shadowColor = 'transparent';
    }
    ctx.fillStyle = isGroup ? '#b6bbaa' : '#9fa599';
    drawRoundedRect(ctx, x + 2, y + 2, size.width - 4, 27, 4);
    ctx.fill();
    ctx.fillStyle = '#2d312e';
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(meta.title || data.type, x + 12, y + 19);

    if (!isGroup) {
        ctx.fillStyle = ['material', 'building-status', 'building-signal', 'material-change'].includes(data.type) ? '#a04370' : '#242c3d';
        ctx.fillRect(x + 14, y + 38, Math.max(20, size.width - 28), Math.max(20, size.height - 52));
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 13px "Segoe UI", sans-serif';
        const lines = getNodeExportLines(id);
        let textY = y + 61;
        lines.forEach((line, index) => {
            ctx.font = index === 0 ? 'bold 13px "Segoe UI", sans-serif' : '12px "Segoe UI", sans-serif';
            textY = drawWrappedText(ctx, line, x + 24, textY, size.width - 48, 17, 2) + 2;
        });
    } else {
        ctx.fillStyle = '#4a5046';
        ctx.font = '13px "Segoe UI", sans-serif';
        drawWrappedText(ctx, data.text || t('groupDefault'), x + 14, y + 52, size.width - 28, 18, 4);
    }

    const drawPort = (direction, index) => {
        const pos = getExportPortPosition(id, direction, `${direction === 'output' ? 'out' : 'in'}-${index}`);
        const px = pos.x - bounds.left;
        const py = pos.y - bounds.top;
        ctx.fillStyle = direction === 'output' ? '#d45d8f' : '#3b82f6';
        ctx.strokeStyle = '#4a5046';
        ctx.lineWidth = 1.5;
        ctx.fillRect(px - 5, py - 5, 10, 10);
        ctx.strokeRect(px - 5, py - 5, 10, 10);
    };
    for (let i = 0; i < Number(meta.inputs || 0); i++) drawPort('input', i);
    for (let i = 0; i < Number(meta.outputs || 0); i++) drawPort('output', i);
    ctx.restore();
}

function exportGraphPng() {
    const nodeIds = Object.keys(nodesData).filter(id => document.getElementById(id));
    if (!nodeIds.length) return;
    const padding = 80;
    const rawBounds = getAllNodesBounds();
    const bounds = {
        left: Math.max(0, rawBounds.left - padding),
        top: Math.max(0, rawBounds.top - padding),
        right: Math.min(WORKSPACE_WIDTH, rawBounds.right + padding),
        bottom: Math.min(WORKSPACE_HEIGHT, rawBounds.bottom + padding)
    };
    const width = Math.max(320, Math.ceil(bounds.right - bounds.left));
    const height = Math.max(240, Math.ceil(bounds.bottom - bounds.top));
    const maxSide = 4096;
    const scale = Math.min(2, maxSide / Math.max(width, height));
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = Math.ceil(width * scale);
    exportCanvas.height = Math.ceil(height * scale);
    const ctx = exportCanvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.fillStyle = '#cbd0c4';
    ctx.fillRect(0, 0, width, height);

    nodeIds.filter(id => nodesData[id]?.type === 'group').forEach(id => drawExportNode(ctx, id, bounds));
    ctx.strokeStyle = '#7a8274';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    connections.forEach(conn => {
        if (!nodesData[conn.fromNode] || !nodesData[conn.toNode]) return;
        const p1 = getExportPortPosition(conn.fromNode, 'output', conn.fromPort);
        const p2 = getExportPortPosition(conn.toNode, 'input', conn.toPort);
        const x1 = p1.x - bounds.left;
        const y1 = p1.y - bounds.top;
        const x2 = p2.x - bounds.left;
        const y2 = p2.y - bounds.top;
        const deltaX = Math.abs(x2 - x1) * 0.5;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.bezierCurveTo(x1 + deltaX, y1, x2 - deltaX, y2, x2, y2);
        ctx.stroke();
    });
    nodeIds.filter(id => nodesData[id]?.type !== 'group').forEach(id => drawExportNode(ctx, id, bounds));

    const link = document.createElement('a');
    const name = stripGameRichText(serverState.buildingName || serverState.BuildingName || 'logic-editor')
        .replace(/[\\/:*?"<>|]+/g, '_')
        .trim() || 'logic-editor';
    link.download = `${name}.png`;
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
}

window.deleteNode = function(id) {
    document.getElementById(id)?.remove();
    connections = connections.filter(conn => conn.fromNode !== id && conn.toNode !== id);
    delete nodesData[id];
    selectedNodeIds.delete(id);
    renderConnections();
    updateSignalMonitors();
    markDirty();
};

function persistLayout() {
    localStorage.setItem(storageKey, buildLayoutJson());
}

function buildLayoutJson() {
    return JSON.stringify({ nodesData, connections, nodeIdCounter, connectionIdCounter, canvasZoom, canvasPanX, canvasPanY });
}

function restoreLayout(layoutJson) {
    const saved = layoutJson || localStorage.getItem(storageKey);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            return loadLayoutState(data, true);
        } catch {
            if (!layoutJson) localStorage.removeItem(storageKey);
        }
    }
    return false;
}

function loadLayoutState(data, persistLocal) {
    document.querySelectorAll('.node').forEach(node => node.remove());
    nodesData = data.nodesData || {};
    connections = data.connections || [];
    nodeIdCounter = data.nodeIdCounter || 0;
    connectionIdCounter = data.connectionIdCounter || 0;
    clearSelection();
    setCanvasZoom(data.canvasZoom || 1);
    setCanvasPan(data.canvasPanX || 0, data.canvasPanY || 0);
    Object.entries(nodesData).forEach(([id, node]) => {
        const size = node.type === 'group'
            ? getGroupSize(id)
            : getNodeVisualSize(node.type, id);
        const pos = clampToWorkspace(node.x, node.y, size.width, size.height);
        node.x = pos.x;
        node.y = pos.y;
    });
    Object.entries(nodesData).forEach(([id, node]) => {
        const el = createNodeDOM(id, node.type, node.x, node.y);
        if (el) nodeLayer.appendChild(el);
    });
    renderConnections();
    updateSignalMonitors();
    if (persistLocal) persistLayout();
    return Object.keys(nodesData).length > 0;
}

function createDefaultGraph() {
    document.querySelectorAll('.node').forEach(node => node.remove());
    clearSelection();
    setCanvasZoom(1);
    setCanvasPan(0, 0);
    nodesData = {
        node_out: { type: 'output', x: 520, y: 180 }
    };
    connections = [];
    nodeIdCounter = 10;
    connectionIdCounter = 10;
    Object.entries(nodesData).forEach(([id, node]) => nodeLayer.appendChild(createNodeDOM(id, node.type, node.x, node.y)));
    renderConnections();
    updateSignalMonitors();
    persistLayout();
}

if (liveSignal) { liveSignalBtn.classList.add('live-on'); container.classList.add('live-active'); }
liveSignalBtn.addEventListener('click', () => {
    liveSignal = !liveSignal;
    liveSignalBtn.classList.toggle('live-on', liveSignal);
    container.classList.toggle('live-active', liveSignal);
    localStorage.setItem(LIVE_SIGNAL_KEY, liveSignal ? '1' : '0');
    updateLiveSignals();
});

function getGameOutputSignalValue() {
    const value = Number(serverState?.OutputSignalValue ?? serverState?.outputSignalValue ?? gameOutputSignal ?? 0);
    return Number.isFinite(value) ? Math.max(0, Math.min(15, Math.floor(value))) : 0;
}

function getRuntimeNodeOutputValue(nodeId, outputPortIndex) {
    const values = serverState?.NodeOutputValues ?? serverState?.nodeOutputValues;
    if (!values || typeof values !== 'object') return null;
    const runtimeNodeId = normalizeNodeId(nodeId, nodesData[nodeId]?.type);
    const key = `${runtimeNodeId}:${outputPortIndex}`;
    if (!Object.prototype.hasOwnProperty.call(values, key)) return null;
    const value = Number(values[key]);
    return Number.isFinite(value) ? value : null;
}

function getLiveNodeOutputValue(nodeId, outputPortIndex) {
    const runtimeValue = getRuntimeNodeOutputValue(nodeId, outputPortIndex);
    return runtimeValue === null ? evaluatePreviewNode(nodeId, outputPortIndex, 0) : runtimeValue;
}

function getLiveConnectionValue(conn) {
    if (nodesData[conn.toNode]?.type === 'output') {
        const bit = Math.max(0, Math.min(3, parsePortIndex(conn.toPort)));
        return (getGameOutputSignalValue() >> bit) & 1;
    }
    return getLiveNodeOutputValue(conn.fromNode, parsePortIndex(conn.fromPort));
}

function updateLiveSignals(resetPreview = true) {
    const ownsPreviewCache = !previewEvalCache;
    if (ownsPreviewCache) {
        previewEvalCache = new Map();
        previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
        previewCanMutateState = false;
    }
    try {
    document.querySelectorAll('.port.output').forEach(p => p.classList.remove('active-out'));
    document.querySelectorAll('.port.input').forEach(p => p.classList.remove('active-in'));
    document.querySelectorAll('.conn-live').forEach(c => c.classList.remove('conn-live'));
    if (!liveSignal) return;
    const connectedOutputPorts = new Set();
    connections.forEach(conn => {
        const outputPortIndex = parsePortIndex(conn.fromPort);
        connectedOutputPorts.add(`${conn.fromNode}:${outputPortIndex}`);
        if (!isPreviewTrue(getLiveConnectionValue(conn))) return;
        document.getElementById(`conn-path-${conn.id}`)?.classList.add('conn-live');
        document.getElementById(conn.fromNode)?.querySelector(`.port.output[data-port="${conn.fromPort}"]`)?.classList.add('active-out');
        document.getElementById(conn.toNode)?.querySelector(`.port.input[data-port="${conn.toPort}"]`)?.classList.add('active-in');
    });
    Object.entries(nodesData).forEach(([id, node]) => {
        const meta = nodeMeta[node.type];
        if (!meta || !meta.outputs) return;
        const el = document.getElementById(id);
        if (!el) return;
        for (let pi = 0; pi < meta.outputs; pi++) {
            if (connectedOutputPorts.has(`${id}:${pi}`)) continue;
            const val = getLiveNodeOutputValue(id, pi);
            if (isPreviewTrue(val)) {
                const port = el.querySelector(`.port.output[data-port="out-${pi}"]`);
                if (port) port.classList.add('active-out');
            }
        }
    });
    updatePreviewStateNotes();
    } finally {
        if (ownsPreviewCache) {
            previewEvalCache = null;
            previewStableOutputSnapshot = null;
            previewCanMutateState = false;
        }
    }
}

function updatePreviewStateNotes() {
    document.querySelectorAll('.node').forEach(el => {
        const id = el.id;
        const node = nodesData[id];
        if (!node) return;
        const note = el.querySelector('.node-note');
        if (!note) return;
        if (node.type === 'delay') {
            if (!node._delayInput) { note.innerHTML = t('idle'); return; }
            const remaining = (node._delayRemaining ?? 0) / 1000;
            const done = remaining <= 0;
            note.innerHTML = done ? `<span style="color:#16a34a">${t('delayed')}</span>` : `<span style="color:#b45309">${t('delaying')} ${remaining.toFixed(1)}s</span>`;
        } else if (node.type === 'pulse-shaper') {
            if (node._pulseHold) { note.innerHTML = `<span style="color:#16a34a">${t('active')}</span>`; return; }
            const remaining = (node._pulseRemaining ?? 0) / 1000;
            note.innerHTML = remaining > 0 ? `<span style="color:#b45309">${t('holding')} ${remaining.toFixed(1)}s</span>` : t('idle');
        }
    });
}

function updateSignalMonitors() {
    const ownsPreviewCache = !previewEvalCache;
    if (ownsPreviewCache) {
        previewEvalCache = new Map();
        previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
        previewCanMutateState = false;
    }
    try {
    updateCounterDisplays();
    Object.entries(nodesData).forEach(([id, node]) => {
        if (node.type !== 'test-signal') return;
        const conn = connections.find(c => c.toNode === id && parsePortIndex(c.toPort) === 0);
        const srcType = conn ? nodesData[conn.fromNode]?.type : null;
        const runtimeValue = conn ? getRuntimeNodeOutputValue(conn.fromNode, parsePortIndex(conn.fromPort)) : null;
        const value = (srcType === 'output')
            ? getGameOutputSignalValue()
            : (runtimeValue === null ? evaluatePreviewInput(id, 0, 0) : runtimeValue);
        const active = Math.abs(value) > 0.0001;
        const nodeEl = document.getElementById(id);
        const stateEl = nodeEl?.querySelector('.signal-state');
        const valueEl = nodeEl?.querySelector('.signal-value');
        if (stateEl) {
            stateEl.textContent = active ? t('signalGreen') : t('signalRed');
            stateEl.classList.toggle('active', active);
        }
        if (valueEl) {
            valueEl.textContent = formatPreviewValue(value, findPreviewInputType(id, 0));
            valueEl.title = String(value);
        }
    });
    updatePreviewStateNotes();
    updateLiveSignals(false);
    } finally {
        if (ownsPreviewCache) {
            previewEvalCache = null;
            previewStableOutputSnapshot = null;
            previewCanMutateState = false;
        }
    }
}

function advancePreviewStateRound() {
    if (previewEvalCache) return;
    previewEvalCache = new Map();
    previewStableOutputSnapshot = buildPreviewStableOutputSnapshot();
    previewCanMutateState = true;
    try {
        Object.entries(nodesData).forEach(([id, node]) => {
            const meta = nodeMeta[node.type];
            if (!meta || !meta.outputs) return;
            for (let pi = 0; pi < meta.outputs; pi++) {
                evaluatePreviewNode(id, pi, 0);
            }
        });
    } finally {
        previewCanMutateState = false;
        previewEvalCache = null;
        previewStableOutputSnapshot = null;
    }
}

function scheduleSignalRefresh() {
    if (signalRefreshFrame) return;
    signalRefreshFrame = requestAnimationFrame(() => {
        signalRefreshFrame = 0;
        updateSignalMonitors();
    });
}

function currentSignalRefreshDelay() {
    return document.hidden ? BACKGROUND_SIGNAL_REFRESH_MS : SIGNAL_REFRESH_MS;
}

function currentPreviewRefreshDelay() {
    return document.hidden ? BACKGROUND_PREVIEW_REFRESH_MS : PREVIEW_REFRESH_MS;
}

function currentFullStateRefreshDelay() {
    return document.hidden ? BACKGROUND_FULL_STATE_REFRESH_MS : FULL_STATE_REFRESH_MS;
}

function schedulePreviewLoop() {
    clearTimeout(monitorPreviewTimer);
    monitorPreviewTimer = setTimeout(() => {
        advancePreviewStateRound();
        scheduleSignalRefresh();
        schedulePreviewLoop();
    }, currentPreviewRefreshDelay());
}

function scheduleStateRefreshLoop() {
    clearTimeout(stateRefreshTimer);
    stateRefreshTimer = setTimeout(async () => {
        try {
            await refreshGameState();
        } finally {
            scheduleStateRefreshLoop();
        }
    }, currentFullStateRefreshDelay());
}

function scheduleRuntimeSignalLoop() {
    clearTimeout(signalStateRefreshTimer);
    signalStateRefreshTimer = setTimeout(async () => {
        try {
            await refreshRuntimeSignals();
        } finally {
            scheduleRuntimeSignalLoop();
        }
    }, currentSignalRefreshDelay());
}

function findPreviewInputType(nodeId, portIndex) {
    const input = connections.find(conn => conn.toNode === nodeId && parsePortIndex(conn.toPort) === portIndex);
    return input ? nodesData[input.fromNode]?.type || '' : '';
}

function evaluatePreviewInput(nodeId, portIndex, depth) {
    const input = connections.find(conn => conn.toNode === nodeId && parsePortIndex(conn.toPort) === portIndex);
    if (!input && isWideMathType(nodesData[nodeId]?.type)) return getWideMathInputDefault(nodeId, portIndex);
    return input ? evaluatePreviewNode(input.fromNode, parsePortIndex(input.fromPort), depth + 1) : 0;
}

function evaluatePreviewInputs(nodeId, count, depth) {
    const total = Math.max(0, Number(count || 0));
    const values = [];
    for (let i = 0; i < total; i++) {
        const input = connections.find(conn => conn.toNode === nodeId && parsePortIndex(conn.toPort) === i);
        if (!input) {
            values.push(isWideMathType(nodesData[nodeId]?.type) ? getWideMathInputDefault(nodeId, i) : 0);
            continue;
        }
        values.push(evaluatePreviewNode(input.fromNode, parsePortIndex(input.fromPort), depth + 1));
    }
    return values;
}

// ===== Evaluation Engine (JS preview — must match C# switch) =====
// For each module, JS preview logic should mirror C# EvaluateRuntimeNumber switch
function evaluatePreviewNode(nodeId, outputPortIndex, depth = 0) {
    const cacheKey = `${nodeId}:${outputPortIndex}`;
    if (previewEvalStack.has(cacheKey)) return getPreviewStableOutput(nodeId, outputPortIndex);
    if (previewEvalCache && previewEvalCache.has(cacheKey)) return previewEvalCache.get(cacheKey);
    previewEvalStack.add(cacheKey);
    let result = 0;
    try {
        result = evaluatePreviewNodeUncached(nodeId, outputPortIndex, depth);
    } finally {
        previewEvalStack.delete(cacheKey);
    }
    if (previewEvalCache) previewEvalCache.set(cacheKey, result);
    return result;
}

function buildPreviewStableOutputSnapshot() {
    const snapshot = new Map();
    Object.entries(nodesData).forEach(([id, node]) => {
        if (!node) return;
        if (node.type === 'counter') snapshot.set(`${id}:0`, node._counterValue || 0);
        else if (node.type === 'sequence') {
            const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
            const step = Math.max(0, Math.min(values.length - 1, Number(node._seqStep || 0)));
            snapshot.set(`${id}:0`, Math.max(0, Math.min(15, Math.floor(Number(values[step] || 0)))));
            snapshot.set(`${id}:1`, step);
        } else if (node.type === 'latch') snapshot.set(`${id}:0`, node._latchState ? 1 : 0);
        else if (node.type === 'toggle') snapshot.set(`${id}:0`, node._togState ? 1 : 0);
        else if (node.type === 'hysteresis') snapshot.set(`${id}:0`, node._hystState ? 1 : 0);
        else if (node.type === 'pulse-shaper') snapshot.set(`${id}:0`, (node._pulseHold || (node._pulseRemaining || 0) > 0) ? 1 : 0);
    });
    return snapshot;
}

function getPreviewStableOutput(nodeId, outputPortIndex) {
    const cacheKey = `${nodeId}:${outputPortIndex}`;
    if (previewStableOutputSnapshot?.has(cacheKey)) return previewStableOutputSnapshot.get(cacheKey);
    const node = nodesData[nodeId];
    if (!node) return 0;
    if (node.type === 'counter') return node._counterValue || 0;
    if (node.type === 'sequence') {
        const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
        const step = Math.max(0, Math.min(values.length - 1, Number(node._seqStep || 0)));
        return outputPortIndex === 1 ? step : Math.max(0, Math.min(15, Math.floor(Number(values[step] || 0))));
    }
    if (node.type === 'latch') return node._latchState ? 1 : 0;
    if (node.type === 'toggle') return node._togState ? 1 : 0;
    if (node.type === 'hysteresis') return node._hystState ? 1 : 0;
    if (node.type === 'pulse-shaper') return (node._pulseHold || (node._pulseRemaining || 0) > 0) ? 1 : 0;
    return 0;
}

function isPreviewStatefulType(type) {
    return ['counter', 'sequence', 'delay', 'latch', 'edge-pulse', 'material-change', 'hysteresis', 'toggle', 'pulse-shaper'].includes(type);
}

function evaluatePreviewNodeUncached(nodeId, outputPortIndex, depth = 0) {
    if (depth > 32) return 0;
    const node = nodesData[nodeId];
    if (!node) return 0;
    const type = node.type;
    if (!previewCanMutateState && isPreviewStatefulType(type)) return getPreviewStableOutput(nodeId, outputPortIndex);
    if (type === 'counter') return evaluatePreviewCounterNode(nodeId, node, depth);
    const a = evaluatePreviewInput(nodeId, 0, depth + 1);
    const b = evaluatePreviewInput(nodeId, 1, depth + 1);
    if (type === 'material') return getSelectedMaterialAmountForPreview();
    if (type === 'constant') return Number(node.value ?? currentNodeInputValue(nodeId, 'value', 100));
    if (type === 'material-low') return getSelectedMaterialAmountForPreview() < Math.max(0, Number(node.value || 100)) ? 1 : 0;
    if (type === 'material-high') return getSelectedMaterialAmountForPreview() >= Math.max(0, Number(node.value || 100)) ? 1 : 0;
    if (type === 'logic-gt') return a > b ? 1 : 0;
    if (type === 'logic-lt') return a < b ? 1 : 0;
    if (type === 'logic-eq') return Math.abs(a - b) < 0.0001 ? 1 : 0;
    if (type === 'logic-range') {
        const c = evaluatePreviewInput(nodeId, 2, depth + 1);
        return a >= Math.min(b, c) && a <= Math.max(b, c) ? 1 : 0;
    }
    if (type === 'math-add') return evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth).reduce((sum, value) => sum + value, 0);
    if (type === 'math-subtract') {
        const values = evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth);
        return values.slice(1).reduce((result, value) => result - value, values[0] || 0);
    }
    if (type === 'math-multiply') return evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth).reduce((result, value) => result * value, 1);
    if (type === 'math-divide') {
        const values = evaluatePreviewInputs(nodeId, getWideMathInputCount(nodeId), depth);
        return values.slice(1).reduce((result, value) => Math.abs(value) < 0.0001 ? 0 : result / value, values[0] || 0);
    }
    if (type === 'math-mod') return Math.abs(b) < 0.0001 ? 0 : a % b;
    if (type === 'math-clamp') {
        const c = evaluatePreviewInput(nodeId, 2, depth + 1);
        return Math.min(Math.max(a, Math.min(b, c)), Math.max(b, c));
    }
    if (type === 'math-negate') return -a;
    if (type === 'math-min') return Math.min(a, b);
    if (type === 'math-max') return Math.max(a, b);
    if (type === 'bool-and') return isPreviewTrue(a) && isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-nand') return isPreviewTrue(a) && isPreviewTrue(b) ? 0 : 1;
    if (type === 'bool-or') return isPreviewTrue(a) || isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-nor') return isPreviewTrue(a) || isPreviewTrue(b) ? 0 : 1;
    if (type === 'bool-xor') return isPreviewTrue(a) !== isPreviewTrue(b) ? 1 : 0;
    if (type === 'bool-not') return isPreviewTrue(a) ? 0 : 1;
    if (type === 'bool-selector') return isPreviewTrue(a) ? b : evaluatePreviewInput(nodeId, 2, depth + 1);
    if (type === 'bool-true') return 1;
    if (type === 'bool-false') return 0;
    if (type === 'inventory-percent') return getInventoryPercentForPreview();
    if (type === 'inventory-stored') return getServerNumber('TotalStoredKg', 'totalStoredKg');
    if (type === 'inventory-remaining') return Math.max(0, getServerNumber('TotalCapacityKg', 'totalCapacityKg') - getServerNumber('TotalStoredKg', 'totalStoredKg'));
    if (type === 'inventory-capacity') return getServerNumber('TotalCapacityKg', 'totalCapacityKg');
    if (type === 'power-percent') return getPowerPercentForPreview();
    if (type === 'power-stored') return getServerNumber('PowerStoredJoules', 'powerStoredJoules');
    if (type === 'power-remaining') return getServerNumber('PowerRemainingJoules', 'powerRemainingJoules');
    if (type === 'power-capacity') return getServerNumber('PowerCapacityJoules', 'powerCapacityJoules');
    if (type === 'building-status') {
        const building = getSelectedBuilding(nodeId);
        return building && (building.Operational ?? building.operational) ? 1 : 0;
    }
    if (type === 'building-signal') {
        const building = getSelectedBuilding(nodeId);
        return building ? getBuildingSignalValue(building) : 0;
    }
    if (type === 'sequence') {
        const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
        const advanceValue = a;
        const resetValue = b;
        const advanceActive = isPreviewTrue(advanceValue);
        const prevAdvance = node._seqPrevAdvance || false;
        node._seqPrevAdvance = advanceActive;
        const resetActive = isPreviewTrue(resetValue);
        const prevReset = node._seqPrevReset || false;
        node._seqPrevReset = resetActive;
        if (resetActive && !prevReset) {
            node._seqStep = 0;
        } else if (advanceActive && !prevAdvance) {
            node._seqStep = ((node._seqStep || 0) + 1) % values.length;
        }
        if (node._seqStep === undefined) node._seqStep = 0;
        if (outputPortIndex === 1) return node._seqStep;
        return Math.max(0, Math.min(15, Math.floor(Number(values[node._seqStep] || 0))));
    }
    if (type === 'split4') {
        const raw = Math.max(0, Math.min(15, Math.floor(Number(a || 0))));
        const bits = [raw & 1, (raw >> 1) & 1, (raw >> 2) & 1, (raw >> 3) & 1];
        return bits[Math.min(3, Math.max(0, outputPortIndex))] || 0;
    }
    if (type === 'merge4') {
        let v = 0;
        for (let i = 0; i < 4; i++) {
            if (isPreviewTrue(evaluatePreviewInput(nodeId, i, depth + 1))) v |= 1 << i;
        }
        return v;
    }
    if (type === 'select') {
        const count = Math.max(2, Math.min(12, Math.floor(Number(node.portCount ?? node.value ?? 6))));
        const sel = Math.floor(Math.max(0, evaluatePreviewInput(nodeId, 0, depth + 1)));
        return evaluatePreviewInput(nodeId, Math.min(sel, count - 1) + 1, depth + 1);
    }
    if (type === 'cycle4') return outputPortIndex === Math.floor(simTick / Math.max(1, Math.floor(Number(node.intervalSeconds || 5) * 5))) % 4 ? 1 : 0;
    if (type === 'timer') return simTick % Math.max(1, Math.floor(Number(node.intervalSeconds || 5) * 5)) === 0 ? 1 : 0;
    if (type === 'random') return Math.random() * 100 < Math.max(0, Math.min(100, Number(node.value ?? 50))) ? 1 : 0;
    if (type === 'delay') {
        const inputTrue = isPreviewTrue(a);
        node._delayInput = inputTrue;
        const intervalMs = Math.max(200, Number(node.intervalSeconds || 5) * 1000);
        if (!inputTrue) { node._delayStart = 0; return 0; }
        if (!node._delayStart) node._delayStart = Date.now();
        node._delayRemaining = Math.max(0, intervalMs - (Date.now() - node._delayStart));
        return node._delayRemaining <= 0 ? 1 : 0;
    }
    if (type === 'pulse-shaper') {
        const inputTrue = isPreviewTrue(a);
        node._pulseHold = inputTrue;
        const holdMs = Math.max(100, Number(node.minHoldSeconds || 1) * 1000);
        if (inputTrue) { node._pulseOffTime = 0; return 1; }
        if (!node._pulseOffTime) node._pulseOffTime = Date.now();
        node._pulseRemaining = Math.max(0, holdMs - (Date.now() - node._pulseOffTime));
        return node._pulseRemaining > 0 ? 1 : 0;
    }
    if (type === 'latch') {
        if (isPreviewTrue(b)) { node._latchState = false; return 0; }
        if (isPreviewTrue(a)) node._latchState = true;
        return (node._latchState || false) ? 1 : 0;
    }
    if (type === 'edge-pulse') {
        const cur2 = isPreviewTrue(a);
        const prev2 = node._edgePrev || false;
        node._edgePrev = cur2;
        return cur2 && !prev2 ? 1 : 0;
    }
    if (type === 'material-change') {
        const amt = getSelectedMaterialAmountForPreview();
        const prev3 = node._matChangePrev;
        node._matChangePrev = amt;
        return (prev3 !== undefined && Math.abs(prev3 - amt) > 0.0001) ? 1 : 0;
    }
    if (type === 'hysteresis') {
        const upper = Number(node.upper ?? 500);
        const lower = Number(node.lower ?? 200);
        const prevState = node._hystState === true;
        if (a >= upper) node._hystState = true;
        else if (a <= lower) node._hystState = false;
        else if (node._hystState === undefined) node._hystState = a > lower;
        return node._hystState ? 1 : 0;
    }
    if (type === 'toggle') {
        const prevInput = node._togPrevInput || false;
        const current = isPreviewTrue(a);
        node._togPrevInput = current;
        if (current && !prevInput) {
            node._togState = !(node._togState === true);
        }
        if (node._togState === undefined) node._togState = false;
        return node._togState ? 1 : 0;
    }
    if (type === 'map-range') {
        const inMin = Number(node.inMin ?? 0);
        const inMax = Number(node.inMax ?? 100);
        const outMin = Number(node.outMin ?? 0);
        const outMax = Number(node.outMax ?? 100);
        const range = inMax - inMin;
        if (Math.abs(range) < 0.0001) return outMin;
        const t = (a - inMin) / range;
        return outMin + Math.min(1, Math.max(0, t)) * (outMax - outMin);
    }
    return 0;
}

function evaluatePreviewCounterNode(nodeId, node, depth) {
    const pulseValue = evaluatePreviewInput(nodeId, 0, depth + 1);
    const cur = isPreviewTrue(pulseValue);
    const prev = node._counterPrevPulse || false;
    const currentCount = node._counterValue || 0;
    const candidateCount = cur && !prev ? currentCount + 1 : currentCount;
    const resetActive = isPreviewTrue(evaluatePreviewInput(nodeId, 1, depth + 1));
    node._counterPrevPulse = cur;
    if (resetActive) {
        node._counterValue = 0;
        return candidateCount;
    }
    node._counterValue = candidateCount;
    return candidateCount;
}

function currentNodeInputValue(nodeId, field, fallback) {
    return document.getElementById(nodeId)?.querySelector(`.num-input[data-field="${field}"]`)?.value ?? fallback;
}

function getSelectedMaterialAmountForPreview() {
    const material = getSelectedMaterial();
    return Number(material?.MassKg ?? material?.massKg ?? serverState.selectedMaterialAmountKg ?? serverState.SelectedMaterialAmountKg ?? 0);
}

function getInventoryPercentForPreview() {
    const stored = getServerNumber('TotalStoredKg', 'totalStoredKg');
    const capacity = getServerNumber('TotalCapacityKg', 'totalCapacityKg');
    return capacity > 0 ? Math.min(100, Math.max(0, stored / capacity * 100)) : 0;
}

function getPowerPercentForPreview() {
    const stored = getServerNumber('PowerStoredJoules', 'powerStoredJoules');
    const capacity = getServerNumber('PowerCapacityJoules', 'powerCapacityJoules');
    return capacity > 0 ? Math.min(100, Math.max(0, stored / capacity * 100)) : 0;
}

function getServerNumber(pascalName, camelName) {
    return Number(serverState[pascalName] ?? serverState[camelName] ?? 0);
}

function isPreviewTrue(value) {
    return Math.abs(Number(value || 0)) > 0.0001;
}

function formatPreviewValue(value, sourceType = '') {
    const number = Number(value || 0);
    if (!Number.isFinite(number)) return '0';
    if (sourceType.startsWith('power-')) return formatJoules(number);
    if (sourceType.startsWith('inventory-') && sourceType !== 'inventory-percent') return formatTons(number);
    if (Math.abs(number) >= 1000) return formatTons(number);
    if (Math.abs(number - Math.round(number)) < 0.0001) return String(Math.round(number));
    return number.toFixed(2);
}

function formatJoules(joules) {
    const amount = Math.max(0, Number(joules || 0));
    if (amount >= 1000000) return `${(amount / 1000000).toFixed(1)}MJ`;
    if (amount >= 1000) return `${(amount / 1000).toFixed(1)}kJ`;
    return `${amount.toFixed(0)}J`;
}

// ===== Blueprint Serialization =====
function buildRuntimeBlueprintJson() {
    const nodes = [];
    Object.entries(nodesData).forEach(([id, node]) => {
        const meta = nodeMeta[node.type];
        if (!meta) return;
        const runtimeNode = { Id: normalizeNodeId(id, node.type), Module: meta.module };
        if (meta.card?.layout === 'wide-math') {
            runtimeNode.InputCount = getWideMathInputCount(id);
            runtimeNode.InputValues = ensureWideMathInputValues(id).slice(0, runtimeNode.InputCount).map(value => Number(value || 0));
        }
        if (node.type === 'timer' || node.type === 'cycle4' || node.type === 'delay') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="intervalSeconds"]')?.value;
            runtimeNode.IntervalSeconds = Math.max(0.2, Number(inputValue || node.intervalSeconds || 5));
        }
        if (node.type === 'constant' || node.type === 'material-low' || node.type === 'material-high' || node.type === 'random') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="value"]')?.value;
            const fallback = node.type === 'random' ? 50 : 100;
            const maxValue = node.type === 'random' ? 100 : Number.POSITIVE_INFINITY;
            const rawVal = inputValue != null && inputValue !== '' ? Number(inputValue) : (node.value ?? fallback);
            runtimeNode.Value = Math.min(maxValue, Math.max(0, Number.isNaN(rawVal) ? fallback : rawVal));
        }
        if (node.type === 'building-status' || node.type === 'building-signal') {
            runtimeNode.SelectedBuildingInstanceId = Number(node.buildingInstanceId || 0);
        }
        if (node.type === 'sequence') {
            const values = Array.isArray(node.values) && node.values.length > 0 ? node.values : [0, 0, 0, 0];
            const rawValues = values.slice().map(v => Math.min(15, Math.max(0, Math.floor(Number(v || 0)))));
            runtimeNode.Values = rawValues.length > 0 ? rawValues : [0, 0, 0, 0];
        }
        if (node.type === 'hysteresis') {
            runtimeNode.Upper = Math.max(0, Number(node.upper ?? 500));
            runtimeNode.Lower = Math.max(0, Number(node.lower ?? 200));
        }
        if (node.type === 'pulse-shaper') {
            const inputValue = document.getElementById(id)?.querySelector('.num-input[data-field="minHoldSeconds"]')?.value;
            runtimeNode.IntervalSeconds = Math.max(0.1, Number(inputValue || node.minHoldSeconds || 1));
        }
        if (node.type === 'map-range') {
            const el = document.getElementById(id);
            runtimeNode.InMin = Number(el?.querySelector('.num-input[data-field="inMin"]')?.value || node.inMin || 0);
            runtimeNode.InMax = Number(el?.querySelector('.num-input[data-field="inMax"]')?.value || node.inMax || 100);
            runtimeNode.OutMin = Number(el?.querySelector('.num-input[data-field="outMin"]')?.value || node.outMin || 0);
            runtimeNode.OutMax = Number(el?.querySelector('.num-input[data-field="outMax"]')?.value || node.outMax || 100);
        }
        nodes.push(runtimeNode);
    });
    ensureSystemNodes(nodes);
    const runtimeConnections = connections.map(conn => ({
        FromNodeId: normalizeNodeId(conn.fromNode, nodesData[conn.fromNode]?.type),
        FromPortIndex: parsePortIndex(conn.fromPort),
        ToNodeId: normalizeNodeId(conn.toNode, nodesData[conn.toNode]?.type),
        ToPortIndex: parsePortIndex(conn.toPort)
    }));
    return JSON.stringify({ Nodes: nodes, Connections: runtimeConnections });
}

function ensureSystemNodes(nodes) {
    const required = [
        { Id: 'system:material', Module: 'MaterialCondition' },
        { Id: 'system:compare', Module: 'Variable' },
        { Id: 'system:output', Module: 'Output' }
    ];
    required.forEach(item => {
        if (!nodes.some(node => node.Id === item.Id)) nodes.push(item);
    });
}

function normalizeNodeId(id, type) {
    if (id === 'node_mat' || type === 'material') return 'system:material';
    if (id === 'node_out' || type === 'output') return 'system:output';
    return id;
}

function parsePortIndex(port) {
    const parts = String(port || '0').split('-');
    return Number(parts[1] || 0);
}

function currentThreshold() {
    const constant = Object.keys(nodesData).find(id => nodesData[id].type === 'constant');
    const value = constant ? document.getElementById(constant)?.querySelector('.num-input')?.value : '';
    return Math.max(0, Number(value || serverState.conditionThresholdKg || serverState.ConditionThresholdKg || 100));
}

exportPngBtn.addEventListener('click', exportGraphPng);
sidebarToggleBtn.addEventListener('click', () => {
    sidebarCollapsed = !sidebarCollapsed;
    applySidebarCollapsedState();
});
docsBtn.addEventListener('click', () => toggleDocsPage());
fitViewBtn.addEventListener('click', fitAllNodesToView);
langBtn.addEventListener('click', () => {
    currentLanguage = currentLanguage === 'zh' ? 'en' : 'zh';
    localizePage(true);
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && nodeMenu.classList.contains('visible')) {
        hideNodeMenu();
        e.preventDefault();
        return;
    }
    if (e.key === 'Escape' && docsPage.classList.contains('visible')) {
        toggleDocsPage(false);
        return;
    }
    if (docsPage.classList.contains('visible') || e.target.closest('input') || e.target.isContentEditable) {
        return;
    }
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodeIds.size) {
        e.preventDefault();
        deleteSelectedNodes();
        return;
    }
    if (e.ctrlKey && e.key.toLowerCase() === 'c') {
        e.preventDefault();
        copySelectedNodes();
        return;
    }
    if (e.ctrlKey && e.key.toLowerCase() === 'v') {
        e.preventDefault();
        pasteCopiedNodes();
    }
});

// ===== HTTP API (save / state / heartbeat) =====
async function fetchWithTimeout(url, options = {}, timeoutMs = 1500) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), timeoutMs);
    try {
        return await fetch(url, { ...options, signal: controller.signal });
    } finally {
        clearTimeout(timeout);
    }
}

async function saveToGame(savingText, savedText) {
    setStatus(savingText);
    const payload = {
        RuntimeBlueprintJson: buildRuntimeBlueprintJson(),
        RuntimeLayoutJson: buildLayoutJson(),
        OutputModeValue: 1,
        SourceModeValue: 1,
        ConditionThresholdKg: currentThreshold(),
        ConditionItemKey: selectedMaterialKey || serverState.conditionItemKey || serverState.ConditionItemKey || ''
    };
    const response = await fetchWithTimeout(`/api/save?id=${encodeURIComponent(editorId)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }, 3000);
    if (!response.ok) {
        setStatus(t('saveFailed'));
        return;
    }
    persistLayout();
    setStatus(savedText);
}

async function refreshGameState() {
    if (stateRefreshInFlight) return;
    stateRefreshInFlight = true;
    try {
        const response = await fetchWithTimeout(`/api/state?id=${encodeURIComponent(editorId)}`, {}, 3000);
        if (!response.ok) return;
        const nextState = await response.json();
        const previousMaterialKey = selectedMaterialKey;
        serverState = { ...serverState, ...nextState };
        setEditorTitle(serverState.buildingName || serverState.BuildingName);
        if (!selectedMaterialKey) {
            selectedMaterialKey = serverState.conditionItemKey || serverState.ConditionItemKey || '';
        }
        if (!selectedMaterialKey) {
            const selected = getSelectedMaterial();
            selectedMaterialKey = selected?.Key || selected?.key || '';
        }
        if (previousMaterialKey !== selectedMaterialKey || nextState.Materials || nextState.materials || nextState.Buildings || nextState.buildings) {
            document.querySelectorAll('.material-content').forEach(content => {
                const material = getSelectedMaterial();
                if (content && material) {
                    content.querySelector('h3').textContent = stripGameRichText(material.Name || material.name || selectedMaterialKey);
                    content.querySelector('p').textContent = `${t('current')} ${formatTons(material.MassKg ?? material.massKg ?? 0)}`;
                }
            });
            document.querySelectorAll('.building-content').forEach(content => {
                const node = content.closest('.node');
                const building = node ? getSelectedBuilding(node.id) : null;
                if (!building) return;
                content.querySelector('h3').textContent = stripGameRichText(building.Name || building.name || `${t('building')} ${getBuildingId(building)}`);
                content.querySelector('p').textContent = nodesData[node.id]?.type === 'building-signal'
                    ? `${t('signalValue')} ${getBuildingSignalValue(building)}`
                    : ((building.Operational ?? building.operational) ? t('currentAvailable') : t('currentUnavailable'));
            });
        }
        scheduleSignalRefresh();
    } catch {
        // Heartbeat handles disconnected-game UI.
    } finally {
        stateRefreshInFlight = false;
    }
}

async function refreshRuntimeSignals() {
    if (signalStateRefreshInFlight) return;
    signalStateRefreshInFlight = true;
    try {
        const response = await fetchWithTimeout(`/api/signals?id=${encodeURIComponent(editorId)}`);
        if (!response.ok) return;
        const nextSignals = await response.json();
        serverState.OutputSignalValue = nextSignals.OutputSignalValue ?? nextSignals.outputSignalValue ?? 0;
        serverState.NodeOutputValues = nextSignals.NodeOutputValues ?? nextSignals.nodeOutputValues ?? {};
        scheduleSignalRefresh();
    } catch {
        // Heartbeat handles disconnected-game UI; the next signal tick retries automatically.
    } finally {
        signalStateRefreshInFlight = false;
    }
}

function sendHeartbeat() {
    fetchWithTimeout(`/api/heartbeat?id=${encodeURIComponent(editorId)}`)
        .then(response => {
            if (!response.ok) throw new Error('heartbeat failed');
            heartbeatFailures = 0;
        })
        .catch(() => {
            heartbeatFailures++;
            if (heartbeatFailures >= 3) {
                handleGameDisconnected();
            }
        });
}

async function boot() {
    await refreshGameState();
    const serverLayout = serverState.runtimeLayoutJson || serverState.RuntimeLayoutJson || '';
    if (!restoreLayout(serverLayout) && !restoreLayout()) createDefaultGraph();
    setStatus(t('connected'));
    updateSignalMonitors();
    schedulePreviewLoop();
    scheduleRuntimeSignalLoop();
    scheduleStateRefreshLoop();
    sendHeartbeat();
    heartbeatTimer = setInterval(sendHeartbeat, 2000);
}

document.addEventListener('visibilitychange', () => {
    schedulePreviewLoop();
    scheduleRuntimeSignalLoop();
    scheduleStateRefreshLoop();
    if (!document.hidden) {
        refreshGameState();
        refreshRuntimeSignals();
        scheduleSignalRefresh();
    }
});

boot();
